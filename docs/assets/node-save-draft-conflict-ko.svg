<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif, 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic'" role="img" aria-labelledby="title desc">
  <title id="title">Stale-conflict 재조정 프롬프트 — 와이어프레임</title>
  <desc id="desc">Stale-conflict 재조정 모달 와이어프레임. 노드가 동시에 수정되어 BFF 재시도까지 모두 충돌했음을 알리고, 버리기/다시 수정 두 가지 동작을 제공하며, 실패한 저장에 대한 감사 항목이 남지 않음을 안내합니다.</desc>

  <style>
    .page { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1; }
    .panel { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 8; ry: 8; }
    .scrim { fill: #18181b; opacity: 0.45; }
    .alert { fill: #fef2f2; stroke: #b91c1c; stroke-width: 1; rx: 6; ry: 6; }
    .btn { fill: #ffffff; stroke: #3f3f46; stroke-width: 1; rx: 4; ry: 4; }
    .btn-primary { fill: #1d4ed8; stroke: #1d4ed8; stroke-width: 1; rx: 4; ry: 4; }
    .btn-warn { fill: #b91c1c; stroke: #b91c1c; stroke-width: 1; rx: 4; ry: 4; }
    .h1 { font-size: 17px; font-weight: 600; fill: #18181b; }
    .h2 { font-size: 13px; font-weight: 600; fill: #18181b; }
    .lbl { font-size: 12px; fill: #52525b; }
    .val { font-size: 12px; fill: #18181b; }
    .muted { font-size: 11px; fill: #71717a; }
    .alert-text { font-size: 12px; fill: #b91c1c; }
    .btn-primary-text { font-size: 12px; font-weight: 600; fill: #ffffff; }
    .btn-warn-text { font-size: 12px; font-weight: 600; fill: #ffffff; }
    .note { font-size: 11px; font-style: italic; fill: #a16207; }
  </style>

  <rect x="0" y="0" width="900" height="560" fill="#fafafa" />
  <rect x="16" y="16" width="868" height="528" class="page" rx="8" ry="8" />
  <g transform="translate(40, 48)" opacity="0.55">
    <text class="h1">설정 · 노드</text>
    <rect x="0" y="40" width="820" height="32" fill="#f4f4f5" stroke="#d4d4d8" rx="4" ry="4" />
    <rect x="0" y="80" width="820" height="60" fill="#ffffff" stroke="#d4d4d8" rx="6" ry="6" />
    <text class="muted" x="16" y="116">node-alpha · Acme Corp · node-alpha.local</text>
  </g>

  <rect x="0" y="0" width="900" height="560" class="scrim" />

  <g transform="translate(180, 110)">
    <rect x="0" y="0" width="540" height="340" class="panel" />

    <text class="h1" x="24" y="36">저장이 두 번 충돌했습니다</text>

    <rect x="24" y="56" width="492" height="68" class="alert" />
    <text class="alert-text" x="40" y="80">⚠ 편집 도중 다른 사용자가 같은 노드를 수정했고,</text>
    <text class="alert-text" x="40" y="98">자동 재시도까지 충돌했기 때문에 저장이 기록되지</text>
    <text class="alert-text" x="40" y="116">않았습니다.</text>

    <text class="lbl" x="24" y="146">처리 방법을 선택하세요:</text>

    <g transform="translate(24, 162)">
      <text class="h2">버리기 (Discard)</text>
      <text class="muted" y="16">저장하지 않은 편집 내용을 폐기하고 최신 적용</text>
      <text class="muted" y="32">상태로 다이얼로그를 다시 엽니다.</text>
    </g>

    <g transform="translate(24, 220)">
      <text class="h2">다시 수정 (Re-edit)</text>
      <text class="muted" y="16">편집 내용은 유지하면서 기준 상태만 갱신하여</text>
      <text class="muted" y="32">최신 서버 값과 차이를 확인한 뒤 재시도합니다.</text>
    </g>

    <g transform="translate(304, 290)">
      <rect width="100" height="34" class="btn-warn" />
      <text class="btn-warn-text" x="50" y="22" text-anchor="middle">버리기</text>
    </g>
    <g transform="translate(412, 290)">
      <rect width="100" height="34" class="btn-primary" />
      <text class="btn-primary-text" x="50" y="22" text-anchor="middle">다시 수정</text>
    </g>

    <text class="muted" x="24" y="312">실패한 이번 저장에 대한 service.draft_save</text>
    <text class="muted" x="24" y="328">감사 항목은 기록되지 않았습니다.</text>
  </g>

  <g transform="translate(40, 528)">
    <text class="note">와이어프레임 대체 자료 — 수정 다이얼로그 UI 머지 후 실제 PNG 캡처로 교체됩니다.</text>
  </g>
</svg>
