<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, 'Noto Sans KR', sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">간단 미리보기 인스펙터 (와이어프레임)</title>
  <desc id="desc">데스크톱 너비에서 간단 미리보기 인스펙터가 결과 목록 오른쪽에 인라인 패널로 도킹된 Detection 페이지의 라인 드로잉 와이어프레임입니다. 인스펙터에는 요약, 엔드포인트, 탐지 정보, 프로토콜 하이라이트, 전체 조사 열기 동작과 피벗 링크가 표시됩니다.</desc>

  <style>
    .bg { fill: #fafafa; }
    .panel { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 8; ry: 8; }
    .row { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1; rx: 6; ry: 6; }
    .chip { fill: #f4f4f5; stroke: #d4d4d8; stroke-width: 1; rx: 12; ry: 12; }
    .chipSel { fill: #2563eb; stroke: #2563eb; stroke-width: 1; rx: 12; ry: 12; }
    .badge-hi { fill: #b91c1c; stroke: #991b1b; stroke-width: 1; rx: 6; ry: 6; }
    .badge-out { fill: #ffffff; stroke: #71717a; stroke-width: 1; rx: 6; ry: 6; }
    .btn-pri { fill: #2563eb; stroke: #2563eb; stroke-width: 1; rx: 6; ry: 6; }
    .muted { font-size: 11px; fill: #71717a; }
    .lbl { font-size: 12px; fill: #18181b; }
    .mono { font-size: 12px; fill: #18181b; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .h1 { font-size: 16px; font-weight: 600; fill: #18181b; }
    .h2 { font-size: 12px; font-weight: 600; fill: #18181b; letter-spacing: 0.04em; }
    .badge-txt { font-size: 10px; fill: #ffffff; font-weight: 700; letter-spacing: 0.04em; }
    .badge-out-txt { font-size: 10px; fill: #18181b; }
    .btn-pri-txt { font-size: 12px; fill: #ffffff; font-weight: 500; }
    .link { font-size: 12px; fill: #2563eb; }
    .chipSel-txt { font-size: 11px; fill: #ffffff; }
    .sr-note { font-size: 11px; font-style: italic; fill: #a16207; }
  </style>

  <rect class="bg" width="1280" height="720" />

  <g transform="translate(32, 24)">
    <rect x="0" y="0" width="120" height="32" class="panel" />
    <text class="lbl" x="18" y="20">⚙ 필터</text>
    <rect x="136" y="0" width="1080" height="32" class="panel" stroke-dasharray="4 4" />
    <rect class="chipSel" x="148" y="6" width="118" height="20" />
    <text class="chipSel-txt" x="207" y="20" text-anchor="middle">최근 1일 ×</text>
    <rect class="chip" x="276" y="6" width="156" height="20" />
    <text class="muted" x="354" y="20" text-anchor="middle">수준: 높음 × 중간 ×</text>
    <rect class="chip" x="442" y="6" width="130" height="20" />
    <text class="muted" x="507" y="20" text-anchor="middle">출발지: 10.0.0.5 ×</text>
  </g>

  <g transform="translate(32, 80)">
    <text class="h2" y="-6">결과 · 1284개 중 4개</text>
    <rect x="0" y="0" width="820" height="600" class="panel" />

    <g transform="translate(12, 12)">
      <rect x="0" y="0" width="796" height="64" class="row" fill="#eff6ff" stroke="#2563eb" />
      <rect x="0" y="0" width="3" height="64" fill="#2563eb" />
      <rect class="badge-hi" x="14" y="12" width="42" height="16" />
      <text class="badge-txt" x="35" y="23" text-anchor="middle">HIGH</text>
      <text class="muted" x="66" y="24">12:03:21</text>
      <text class="lbl" x="130" y="24" font-weight="500">HTTP 위협</text>
      <rect class="badge-out" x="232" y="12" width="116" height="16" />
      <text class="badge-out-txt" x="290" y="23" text-anchor="middle">Lateral Movement</text>
      <text class="muted" x="360" y="24">신뢰도 0.81</text>
      <text class="mono" x="14" y="50">10.0.0.5:49152 (US) → 203.0.113.45:443 (DE)</text>
      <text class="muted" x="486" y="50">· sensor-01</text>
    </g>
    <g transform="translate(12, 84)">
      <rect x="0" y="0" width="796" height="56" class="row" />
      <rect class="badge-hi" x="14" y="10" width="56" height="16" fill="#a16207" stroke="#854d0e" />
      <text class="badge-txt" x="42" y="21" text-anchor="middle">MEDIUM</text>
      <text class="muted" x="80" y="22">11:58:07</text>
      <text class="lbl" x="144" y="22" font-weight="500">DNS 은닉 채널</text>
      <text class="mono" x="14" y="42">10.0.0.12:53122 (US) → 203.0.113.22:53 (DE)</text>
    </g>
    <g transform="translate(12, 148)">
      <rect x="0" y="0" width="796" height="56" class="row" />
      <rect class="badge-hi" x="14" y="10" width="56" height="16" fill="#71717a" stroke="#52525b" />
      <text class="badge-txt" x="42" y="21" text-anchor="middle">LOW</text>
      <text class="muted" x="80" y="22">11:42:55</text>
      <text class="lbl" x="144" y="22" font-weight="500">차단 목록 HTTP</text>
      <text class="mono" x="14" y="42">10.0.0.30:60112 (US) → 203.0.113.100:80 (??)</text>
    </g>
    <g transform="translate(12, 212)">
      <rect x="0" y="0" width="796" height="56" class="row" />
      <rect class="badge-hi" x="14" y="10" width="42" height="16" />
      <text class="badge-txt" x="35" y="21" text-anchor="middle">HIGH</text>
      <text class="muted" x="66" y="22">11:02:09</text>
      <text class="lbl" x="130" y="22" font-weight="500">포트 스캔</text>
      <text class="mono" x="14" y="42">10.0.0.5 → 203.0.113.8 포트 +48개 더</text>
    </g>
  </g>

  <g transform="translate(872, 80)">
    <rect x="0" y="0" width="376" height="600" class="panel" />

    <rect x="0" y="0" width="376" height="56" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />
    <text class="h1" x="16" y="24">HTTP 위협</text>
    <text class="muted" x="16" y="42">2026-04-22 12:03:21 UTC</text>
    <text class="muted" x="354" y="24" text-anchor="end">×</text>

    <g transform="translate(16, 72)">
      <text class="h2">요약</text>
      <rect class="badge-hi" x="0" y="10" width="42" height="18" />
      <text class="badge-txt" x="21" y="22" text-anchor="middle">HIGH</text>
      <rect class="badge-out" x="52" y="10" width="116" height="18" />
      <text class="badge-out-txt" x="110" y="22" text-anchor="middle">Lateral Movement</text>
      <text class="muted" x="180" y="23">신뢰도 0.81</text>
      <text class="muted" x="246" y="23">정책 3개 · 최대 0.87</text>
    </g>

    <g transform="translate(16, 120)">
      <text class="h2">엔드포인트</text>
      <text class="muted" x="0" y="24">출발지</text>
      <text class="mono" x="72" y="24">10.0.0.5:49152</text>
      <text class="muted" x="226" y="24">(US)</text>
      <text class="muted" x="252" y="24">⧉</text>
      <text class="muted" x="0" y="44">목적지</text>
      <text class="mono" x="72" y="44">203.0.113.45:443</text>
      <text class="muted" x="226" y="44">(DE)</text>
      <text class="muted" x="252" y="44">⧉</text>
    </g>

    <g transform="translate(16, 184)">
      <text class="h2">탐지 정보</text>
      <text class="muted" x="0" y="22">센서</text>
      <text class="lbl" x="96" y="22">sensor-01</text>
      <text class="muted" x="0" y="40">공격 종류</text>
      <text class="lbl" x="96" y="40">SQL Injection</text>
      <text class="muted" x="0" y="58">AI 모델</text>
      <text class="lbl" x="96" y="58">비지도</text>
    </g>

    <g transform="translate(16, 264)">
      <text class="h2">프로토콜</text>
      <text class="muted" x="0" y="22">메서드</text>
      <text class="mono" x="110" y="22">GET</text>
      <text class="muted" x="0" y="40">호스트</text>
      <text class="mono" x="110" y="40">login.example.com</text>
      <text class="muted" x="0" y="58">URI</text>
      <text class="mono" x="110" y="58">/admin?or=1--</text>
      <text class="muted" x="0" y="76">상태 코드</text>
      <text class="mono" x="110" y="76">200</text>
    </g>

    <g transform="translate(16, 368)">
      <text class="h2">동작</text>
      <rect class="btn-pri" x="0" y="12" width="200" height="28" />
      <text class="btn-pri-txt" x="100" y="30" text-anchor="middle">↗ 전체 조사 열기</text>
      <text class="link" x="0" y="60">· 동일한 출발지 IP · 최근 24시간</text>
      <text class="link" x="0" y="80">· 동일한 목적지 IP · 최근 24시간</text>
      <text class="link" x="0" y="100">· 동일한 종류 · 최근 7일</text>
    </g>
  </g>

  <text class="sr-note" x="32" y="700">와이어프레임 대체 이미지 — docs/ko/detection.md의 안내 참고. 샘플 데이터가 심어진 스테이징이 준비되면 실제 캡처로 교체됩니다.</text>
</svg>
