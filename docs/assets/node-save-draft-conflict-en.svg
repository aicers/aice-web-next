<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Stale-conflict reconciliation prompt — wireframe</title>
  <desc id="desc">Wireframe of the stale-conflict reconciliation prompt: a modal informs the user that the node was modified concurrently and the BFF replay also conflicted, with Discard and Re-edit actions and a note that no audit entry was written for the failed save.</desc>

  <style>
    .page { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1; }
    .panel { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 8; ry: 8; }
    .scrim { fill: #18181b; opacity: 0.45; }
    .alert { fill: #fef2f2; stroke: #b91c1c; stroke-width: 1; rx: 6; ry: 6; }
    .btn { fill: #ffffff; stroke: #3f3f46; stroke-width: 1; rx: 4; ry: 4; }
    .btn-primary { fill: #1d4ed8; stroke: #1d4ed8; stroke-width: 1; rx: 4; ry: 4; }
    .btn-warn { fill: #b91c1c; stroke: #b91c1c; stroke-width: 1; rx: 4; ry: 4; }
    .h1 { font-size: 17px; font-weight: 600; fill: #18181b; }
    .h2 { font-size: 13px; font-weight: 600; fill: #18181b; }
    .lbl { font-size: 12px; fill: #52525b; }
    .val { font-size: 12px; fill: #18181b; }
    .muted { font-size: 11px; fill: #71717a; }
    .alert-text { font-size: 12px; fill: #b91c1c; }
    .btn-text { font-size: 12px; font-weight: 600; fill: #18181b; }
    .btn-primary-text { font-size: 12px; font-weight: 600; fill: #ffffff; }
    .btn-warn-text { font-size: 12px; font-weight: 600; fill: #ffffff; }
    .note { font-size: 11px; font-style: italic; fill: #a16207; }
  </style>

  <!-- Underlying list page (faded) -->
  <rect x="0" y="0" width="900" height="560" fill="#fafafa" />
  <rect x="16" y="16" width="868" height="528" class="page" rx="8" ry="8" />
  <g transform="translate(40, 48)" opacity="0.55">
    <text class="h1">Settings · Nodes</text>
    <rect x="0" y="40" width="820" height="32" fill="#f4f4f5" stroke="#d4d4d8" rx="4" ry="4" />
    <rect x="0" y="80" width="820" height="60" fill="#ffffff" stroke="#d4d4d8" rx="6" ry="6" />
    <text class="muted" x="16" y="116">node-alpha · Acme Corp · node-alpha.local</text>
  </g>

  <!-- Modal scrim -->
  <rect x="0" y="0" width="900" height="560" class="scrim" />

  <!-- Reconciliation modal -->
  <g transform="translate(180, 110)">
    <rect x="0" y="0" width="540" height="340" class="panel" />

    <text class="h1" x="24" y="36">Save conflicted twice</text>

    <rect x="24" y="56" width="492" height="68" class="alert" />
    <text class="alert-text" x="40" y="80">⚠ Another writer changed this node while you were</text>
    <text class="alert-text" x="40" y="98">editing. The automatic replay also conflicted, so the</text>
    <text class="alert-text" x="40" y="116">save was not written.</text>

    <text class="lbl" x="24" y="146">Choose how to reconcile:</text>

    <g transform="translate(24, 162)">
      <text class="h2">Discard</text>
      <text class="muted" y="16">Drop your unsaved edits and reload the dialog</text>
      <text class="muted" y="32">against the latest applied state.</text>
    </g>

    <g transform="translate(24, 220)">
      <text class="h2">Re-edit</text>
      <text class="muted" y="16">Keep your edits but refresh the baseline so you</text>
      <text class="muted" y="32">can review field-level differences before retrying.</text>
    </g>

    <!-- Buttons -->
    <g transform="translate(304, 290)">
      <rect width="100" height="34" class="btn-warn" />
      <text class="btn-warn-text" x="50" y="22" text-anchor="middle">Discard</text>
    </g>
    <g transform="translate(412, 290)">
      <rect width="100" height="34" class="btn-primary" />
      <text class="btn-primary-text" x="50" y="22" text-anchor="middle">Re-edit</text>
    </g>

    <text class="muted" x="24" y="312">No service.draft_save audit entry was written for</text>
    <text class="muted" x="24" y="328">this failed save.</text>
  </g>

  <!-- Wireframe note -->
  <g transform="translate(40, 528)">
    <text class="note">Wireframe stand-in — replace with a real PNG capture once the Edit dialog UI ships.</text>
  </g>
</svg>
