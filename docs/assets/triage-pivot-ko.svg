<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">트리아지 피벗 패널 (와이어프레임)</title>
  <desc id="desc">1A-2 단계에서 도입한 트리아지 관련 이벤트 패널과 브레드크럼 와이어프레임. 상단의 브레드크럼은 "자산 10.0.0.1 › JA3: abc..." 형태이며, 그 아래의 관련 이벤트 카드는 차원별(외부 IP, 등록 가능 도메인, JA3, SNI)로 그룹된 섹션을 보여줍니다. 각 섹션 헤더는 기준 값과 더 보기 옵션을, 각 행은 시각/종류/점수/행별 피벗 버튼을 표시합니다.</desc>
  <style>
    .bg { fill: #fafafa; }
    .panel { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1; rx: 6; ry: 6; }
    .panel-header { fill: #f4f4f5; stroke: #e5e7eb; stroke-width: 1; }
    .text-title { font-size: 18px; fill: #18181b; font-weight: 700; }
    .text-section { font-size: 11px; fill: #71717a; font-weight: 600; letter-spacing: 0.05em; }
    .text-label { font-size: 11px; fill: #71717a; }
    .text-mono { font-size: 12px; fill: #18181b; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .text-muted { font-size: 11px; fill: #a1a1aa; }
    .crumb-active { fill: #18181b; font-size: 13px; font-weight: 700; }
    .crumb-inactive { fill: #71717a; font-size: 13px; }
    .pivot-button { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 4; ry: 4; }
    .pivot-text { fill: #18181b; font-size: 11px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .row-divider { stroke: #e5e7eb; stroke-width: 1; }
  </style>

  <rect class="bg" width="960" height="540"/>

  <!-- Breadcrumb -->
  <g transform="translate(24, 24)">
    <text class="crumb-inactive" x="0" y="14">자산 10.0.0.1</text>
    <text class="crumb-inactive" x="120" y="14">›</text>
    <text class="crumb-active" x="140" y="14">JA3: 7e29c8…b4</text>
  </g>

  <!-- Card -->
  <rect class="panel" x="24" y="56" width="912" height="460"/>
  <rect class="panel-header" x="24" y="56" width="912" height="42"/>
  <text class="text-title" x="40" y="84">관련 이벤트</text>
  <text class="text-muted" x="40" y="98" font-size="11">기간의 처음 5,000건만 적재되어 일부 일치 항목이 누락되었을 수 있습니다.</text>

  <!-- Section: 외부 IP -->
  <g transform="translate(40, 116)">
    <text class="text-section" x="0" y="14">외부 IP · 네트워크</text>
    <text class="text-label" x="0" y="32">기준 값: 198.51.100.42, 203.0.113.5</text>
    <line class="row-divider" x1="0" y1="44" x2="880" y2="44"/>
    <text class="text-label" x="0" y="60">시각</text>
    <text class="text-label" x="200" y="60">종류</text>
    <text class="text-label" x="700" y="60" text-anchor="end">점수</text>
    <text class="text-label" x="880" y="60" text-anchor="end">피벗</text>
    <line class="row-divider" x1="0" y1="68" x2="880" y2="68"/>
    <text class="text-mono" x="0" y="86">2026-05-09 12:14:02</text>
    <text class="text-mono" x="200" y="86" font-family="-apple-system">HttpThreat</text>
    <text class="text-mono" x="700" y="86" text-anchor="end">1.50</text>
    <rect class="pivot-button" x="780" y="73" width="100" height="20"/>
    <text class="pivot-text" x="830" y="87" text-anchor="middle">198.51.100.42</text>
  </g>

  <!-- Section: 등록 가능 도메인 -->
  <g transform="translate(40, 232)">
    <text class="text-section" x="0" y="14">등록 가능 도메인 · 애플리케이션</text>
    <text class="text-label" x="0" y="32">기준 값: example.co.uk, badsite.com (+1)</text>
    <line class="row-divider" x1="0" y1="44" x2="880" y2="44"/>
    <text class="text-mono" x="0" y="62">2026-05-09 11:55:00</text>
    <text class="text-mono" x="200" y="62" font-family="-apple-system">BlocklistHttp</text>
    <text class="text-mono" x="700" y="62" text-anchor="end">1.00</text>
    <rect class="pivot-button" x="780" y="49" width="100" height="20"/>
    <text class="pivot-text" x="830" y="63" text-anchor="middle">example.co.uk</text>
    <text class="text-label" x="0" y="92">312건 중 50건 표시</text>
    <text class="text-label" x="880" y="92" text-anchor="end">더 보기</text>
  </g>

  <!-- Section: JA3 -->
  <g transform="translate(40, 360)">
    <text class="text-section" x="0" y="14">JA3 · TLS</text>
    <text class="text-label" x="0" y="32">기준 값: 7e29c8b8…b4</text>
    <line class="row-divider" x1="0" y1="44" x2="880" y2="44"/>
    <text class="text-mono" x="0" y="62">2026-05-09 12:01:42</text>
    <text class="text-mono" x="200" y="62" font-family="-apple-system">SuspiciousTlsTraffic</text>
    <text class="text-mono" x="700" y="62" text-anchor="end">1.50</text>
    <rect class="pivot-button" x="780" y="49" width="100" height="20"/>
    <text class="pivot-text" x="830" y="63" text-anchor="middle">7e29c8…b4</text>
  </g>
</svg>
