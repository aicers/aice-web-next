<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 820" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Detection filter drawer — categorical multi-selects (wireframe)</title>
  <desc id="desc">Line-drawing wireframe of the right-side filter drawer: header title, period chips, time-range inputs, and the new "Categorical filters" section with five collapsible multi-select fields (Threat Level, Threat Country, AI Model Type, Threat Category, Threat Name). The Threat Level field is shown expanded with an All toggle and three checkbox rows; the other fields are shown collapsed with their summary text ("All" or "2 selected"). A pair of action buttons sits at the bottom.</desc>

  <style>
    .page { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1; }
    .panel { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 6; ry: 6; }
    .chip { fill: #f4f4f5; stroke: #d4d4d8; stroke-width: 1; rx: 14; ry: 14; }
    .chip-on { fill: #2563eb; stroke: #2563eb; stroke-width: 1; rx: 14; ry: 14; }
    .row { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 6; ry: 6; }
    .trigger { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 6; ry: 6; }
    .check { fill: #ffffff; stroke: #52525b; stroke-width: 1; rx: 2; ry: 2; }
    .check-on { fill: #2563eb; stroke: #2563eb; stroke-width: 1; rx: 2; ry: 2; }
    .btn { fill: #2563eb; stroke: #2563eb; stroke-width: 1; rx: 6; ry: 6; }
    .btn-ghost { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 6; ry: 6; }
    .h1 { font-size: 16px; font-weight: 600; fill: #18181b; }
    .h2 { font-size: 12px; font-weight: 600; fill: #18181b; }
    .lbl { font-size: 12px; fill: #18181b; }
    .muted { font-size: 11px; fill: #71717a; }
    .chip-on-txt { font-size: 11px; fill: #ffffff; }
    .note { font-size: 11px; font-style: italic; fill: #a16207; }
  </style>

  <!-- Drawer -->
  <rect x="0" y="0" width="560" height="820" fill="#fafafa" />
  <rect x="16" y="16" width="528" height="788" class="page" rx="8" ry="8" />

  <!-- Header -->
  <g transform="translate(32, 48)">
    <text class="h1">Filters</text>
    <text class="muted" y="18">Narrow the detection results by period, time range, and categorical filters.</text>
  </g>

  <!-- Period section -->
  <g transform="translate(32, 108)">
    <text class="h2">Period</text>
    <g transform="translate(0, 12)">
      <rect class="chip-on" x="0" y="0" width="72" height="24" />
      <text class="chip-on-txt" x="36" y="16" text-anchor="middle">Last 1 hour</text>
      <rect class="chip" x="80" y="0" width="72" height="24" />
      <text class="muted" x="116" y="16" text-anchor="middle">Last 12 h</text>
      <rect class="chip" x="160" y="0" width="72" height="24" />
      <text class="muted" x="196" y="16" text-anchor="middle">Last 1 day</text>
      <rect class="chip" x="240" y="0" width="72" height="24" />
      <text class="muted" x="276" y="16" text-anchor="middle">Last 1 week</text>
    </g>
  </g>

  <!-- Time period section -->
  <g transform="translate(32, 172)">
    <text class="h2">Time period</text>
    <rect x="0" y="16" width="224" height="28" class="trigger" />
    <text class="muted" x="10" y="35">Start · YYYY-MM-DD HH:mm</text>
    <rect x="240" y="16" width="224" height="28" class="trigger" />
    <text class="muted" x="250" y="35">End · YYYY-MM-DD HH:mm</text>
  </g>

  <!-- Categorical filters section -->
  <g transform="translate(32, 240)">
    <text class="h2">Categorical filters</text>

    <!-- Threat Level (expanded) -->
    <g transform="translate(0, 16)">
      <rect x="0" y="0" width="464" height="40" class="trigger" />
      <text class="lbl" x="10" y="16">Threat Level</text>
      <text class="muted" x="10" y="32">2 selected</text>
      <text class="muted" x="450" y="24" text-anchor="end">▲</text>

      <!-- Panel -->
      <rect x="0" y="46" width="464" height="128" class="panel" />
      <!-- All toggle -->
      <rect x="12" y="58" width="14" height="14" class="check-on" />
      <text class="lbl" x="34" y="70" font-weight="600">All</text>
      <!-- Option rows -->
      <rect x="12" y="82" width="14" height="14" class="check-on" />
      <text class="lbl" x="34" y="94">Low</text>
      <rect x="12" y="104" width="14" height="14" class="check" />
      <text class="lbl" x="34" y="116">Medium</text>
      <rect x="12" y="126" width="14" height="14" class="check-on" />
      <text class="lbl" x="34" y="138">High</text>
      <text class="muted" x="12" y="162">(Closed-list: All / none → no filter. Threat Name is open-list — saturation still submits.)</text>
    </g>

    <!-- Threat Country (collapsed) -->
    <g transform="translate(0, 200)">
      <rect x="0" y="0" width="464" height="40" class="trigger" />
      <text class="lbl" x="10" y="16">Threat Country</text>
      <text class="muted" x="10" y="32">12 selected</text>
      <text class="muted" x="450" y="24" text-anchor="end">▼</text>
    </g>

    <!-- AI Model Type (collapsed) -->
    <g transform="translate(0, 250)">
      <rect x="0" y="0" width="464" height="40" class="trigger" />
      <text class="lbl" x="10" y="16">AI Model Type</text>
      <text class="muted" x="10" y="32">All</text>
      <text class="muted" x="450" y="24" text-anchor="end">▼</text>
    </g>

    <!-- Threat Category (collapsed) -->
    <g transform="translate(0, 300)">
      <rect x="0" y="0" width="464" height="40" class="trigger" />
      <text class="lbl" x="10" y="16">Threat Category</text>
      <text class="muted" x="10" y="32">3 selected</text>
      <text class="muted" x="450" y="24" text-anchor="end">▼</text>
    </g>

    <!-- Threat Name (collapsed, open-list field) -->
    <g transform="translate(0, 350)">
      <rect x="0" y="0" width="464" height="40" class="trigger" />
      <text class="lbl" x="10" y="16">Threat Name</text>
      <text class="muted" x="10" y="32">4 selected</text>
      <text class="muted" x="450" y="24" text-anchor="end">▼</text>
    </g>
  </g>

  <!-- Actions -->
  <g transform="translate(32, 712)">
    <rect x="0" y="0" width="464" height="36" class="btn" />
    <text x="232" y="22" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="600">Apply</text>
    <rect x="0" y="44" width="464" height="32" class="btn-ghost" />
    <text class="muted" x="232" y="64" text-anchor="middle">Save this filter (coming soon)</text>
  </g>

  <text class="note" x="32" y="800">Wireframe stand-in — refresh with a live capture once staging is wired.</text>
</svg>
