<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img"
     aria-label="탐지 CSV 내보내기 확인 다이얼로그 와이어프레임">
  <title>탐지 CSV 내보내기 (와이어프레임 대체본)</title>
  <desc>탐지 결과 헤더의 CSV 내보내기 버튼과 일치한 행 수, 예상 크기, 계속/취소/
        필터 좁히기 버튼을 표시하는 대용량 내보내기 확인 다이얼로그 오버레이를
        보여주는 도식. 시드된 탐지 데이터를 갖춘 스테이징 환경이 마련되면
        실제 캡처로 교체됩니다.</desc>

  <defs>
    <style>
      .bg      { fill: #0f1420; }
      .panel   { fill: #151b2c; stroke: #2a3352; stroke-width: 1; }
      .row     { fill: #131a2c; stroke: #2a3352; stroke-width: 1; }
      .dialog  { fill: #1b2236; stroke: #3a486b; stroke-width: 1.5; }
      .overlay { fill: #000000; fill-opacity: 0.55; }
      .button  { fill: #1d2742; stroke: #3a486b; stroke-width: 1; rx: 6; ry: 6; }
      .buttonPri { fill: #2749a8; stroke: #3f66c9; stroke-width: 1; rx: 6; ry: 6; }
      .buttonGhost { fill: none; stroke: #3a486b; stroke-width: 1; rx: 6; ry: 6;
                     stroke-dasharray: 4 3; }
      .label   { fill: #c8d0e4; font-family: system-ui, sans-serif; font-size: 14px; }
      .labelSm { fill: #8e97ae; font-family: system-ui, sans-serif; font-size: 12px; }
      .labelLg { fill: #e7ebf5; font-family: system-ui, sans-serif; font-size: 18px;
                 font-weight: 600; }
      .mono    { fill: #e7ebf5; font-family: ui-monospace, monospace; font-size: 12px; }
      .muted   { fill: #6d7690; font-family: system-ui, sans-serif; font-size: 11px;
                 font-style: italic; }
      .icon    { fill: #c8d0e4; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720" />

  <text class="labelLg" x="40" y="50">탐지 이벤트 1 – 50 / 142,318</text>
  <text class="labelSm" x="40" y="78">방금 업데이트됨</text>

  <rect class="button" x="900" y="32" width="44" height="32" />
  <path d="M915 42 a 8 8 0 1 1 -8 8 l 0 -2 l -3 3 l 6 0 l -3 -3"
        fill="none" stroke="#c8d0e4" stroke-width="1.5" />
  <rect class="button" x="956" y="32" width="160" height="32" />
  <path d="M984 42 l 0 12 m -6 -6 l 6 6 l 6 -6 m -12 12 l 12 0"
        fill="none" stroke="#c8d0e4" stroke-width="1.5" />
  <text class="label" x="1004" y="52">CSV 내보내기</text>

  <rect class="row" x="40" y="110" width="1120" height="56" />
  <text class="labelSm" x="56" y="134">높음 · 14:31 · HTTP 위협 · 신뢰도 0.92</text>
  <text class="mono" x="56" y="156">10.0.0.5:1234 → 198.51.100.7:443  ·  sensor-a</text>
  <rect class="row" x="40" y="172" width="1120" height="56" />
  <text class="labelSm" x="56" y="196">중간 · 14:30 · 포트 스캔 · 신뢰도 0.71</text>
  <text class="mono" x="56" y="218">10.0.0.7 → 10.0.0.0/24  ·  sensor-b</text>

  <rect class="overlay" width="1200" height="720" />

  <rect class="dialog" x="320" y="200" width="560" height="320" rx="10" ry="10" />
  <text class="labelLg" x="352" y="248">대용량 결과 내보내기</text>
  <text class="label" x="352" y="294">현재 필터에 일치하는 탐지 이벤트는 142,318건</text>
  <text class="label" x="352" y="316">(약 30 MiB)입니다. 대용량 내보내기는 수 분이</text>
  <text class="label" x="352" y="338">걸릴 수 있고 메모리를 더 많이 사용합니다.</text>
  <text class="label" x="352" y="360">계속하거나 취소하거나 필터를 먼저 좁힐 수 있습니다.</text>

  <rect class="buttonGhost" x="352" y="448" width="140" height="40" />
  <text class="label" x="386" y="473">필터 좁히기</text>
  <rect class="button" x="640" y="448" width="100" height="40" />
  <text class="label" x="680" y="473">취소</text>
  <rect class="buttonPri" x="752" y="448" width="128" height="40" />
  <text class="label" x="780" y="473" fill="#ffffff">계속 내보내기</text>

  <text class="muted" x="40" y="700">와이어프레임 대체본 — 시드된 스테이징 데이터가 마련되면 실제 캡처로 교체됩니다.</text>
</svg>
