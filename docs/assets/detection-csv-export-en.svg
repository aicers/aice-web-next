<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img"
     aria-label="Wireframe stand-in for the Detection CSV export confirmation dialog">
  <title>Detection CSV export (wireframe stand-in)</title>
  <desc>Schematic showing the Detection result header with the Download CSV
        button and the large-export confirmation dialog overlay quoting the
        matched row count, estimated size, and the Continue / Cancel /
        Narrow filter actions. A real screenshot replaces this once a
        staging environment with seeded detection data is available.</desc>

  <defs>
    <style>
      .bg      { fill: #0f1420; }
      .panel   { fill: #151b2c; stroke: #2a3352; stroke-width: 1; }
      .row     { fill: #131a2c; stroke: #2a3352; stroke-width: 1; }
      .dialog  { fill: #1b2236; stroke: #3a486b; stroke-width: 1.5; }
      .overlay { fill: #000000; fill-opacity: 0.55; }
      .button  { fill: #1d2742; stroke: #3a486b; stroke-width: 1; rx: 6; ry: 6; }
      .buttonPri { fill: #2749a8; stroke: #3f66c9; stroke-width: 1; rx: 6; ry: 6; }
      .buttonGhost { fill: none; stroke: #3a486b; stroke-width: 1; rx: 6; ry: 6;
                     stroke-dasharray: 4 3; }
      .label   { fill: #c8d0e4; font-family: system-ui, sans-serif; font-size: 14px; }
      .labelSm { fill: #8e97ae; font-family: system-ui, sans-serif; font-size: 12px; }
      .labelLg { fill: #e7ebf5; font-family: system-ui, sans-serif; font-size: 18px;
                 font-weight: 600; }
      .mono    { fill: #e7ebf5; font-family: ui-monospace, monospace; font-size: 12px; }
      .muted   { fill: #6d7690; font-family: system-ui, sans-serif; font-size: 11px;
                 font-style: italic; }
      .icon    { fill: #c8d0e4; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720" />

  <!-- Result header line in the background -->
  <text class="labelLg" x="40" y="50">Detected events 1 – 50 / 142,318</text>
  <text class="labelSm" x="40" y="78">Updated just now</text>

  <!-- Right-side affordances: Refresh and Download CSV -->
  <rect class="button" x="900" y="32" width="44" height="32" />
  <path class="icon" d="M915 42 a 8 8 0 1 1 -8 8 l 0 -2 l -3 3 l 6 0 l -3 -3"
        fill="none" stroke="#c8d0e4" stroke-width="1.5" />
  <rect class="button" x="956" y="32" width="160" height="32" />
  <path d="M984 42 l 0 12 m -6 -6 l 6 6 l 6 -6 m -12 12 l 12 0"
        fill="none" stroke="#c8d0e4" stroke-width="1.5" />
  <text class="label" x="1004" y="52">Download CSV</text>

  <!-- First two result rows (faded, just to suggest the page) -->
  <rect class="row" x="40" y="110" width="1120" height="56" />
  <text class="labelSm" x="56" y="134">HIGH · 14:31 · HTTP Threat · Conf 0.92</text>
  <text class="mono" x="56" y="156">10.0.0.5:1234 → 198.51.100.7:443  ·  sensor-a</text>
  <rect class="row" x="40" y="172" width="1120" height="56" />
  <text class="labelSm" x="56" y="196">MEDIUM · 14:30 · Port Scan · Conf 0.71</text>
  <text class="mono" x="56" y="218">10.0.0.7 → 10.0.0.0/24  ·  sensor-b</text>

  <!-- Modal overlay -->
  <rect class="overlay" width="1200" height="720" />

  <!-- Confirmation dialog -->
  <rect class="dialog" x="320" y="200" width="560" height="320" rx="10" ry="10" />
  <text class="labelLg" x="352" y="248">Export a large result set?</text>
  <text class="label" x="352" y="294">The current filter matches 142,318 detection</text>
  <text class="label" x="352" y="316">events (about 30 MiB). Large exports take several</text>
  <text class="label" x="352" y="338">minutes and use more memory on this device.</text>
  <text class="label" x="352" y="360">Continue, cancel, or narrow the filter first.</text>

  <!-- Buttons row -->
  <rect class="buttonGhost" x="352" y="448" width="140" height="40" />
  <text class="label" x="386" y="473">Narrow filter</text>
  <rect class="button" x="640" y="448" width="100" height="40" />
  <text class="label" x="676" y="473">Cancel</text>
  <rect class="buttonPri" x="752" y="448" width="128" height="40" />
  <text class="label" x="774" y="473" fill="#ffffff">Continue export</text>

  <text class="muted" x="40" y="700">Wireframe stand-in — real capture replaces this once seeded staging data is available.</text>
</svg>
