<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Aimer 연동 설정 페이지의 Phase 2 동기화 상태 블록 (와이어프레임)</title>
  <desc id="desc">Phase 2 동기화 상태 블록 와이어프레임. 헤더에 고객 선택기와 새로 고침 버튼이 있고, 아래에 세 트랙(스트리밍 baseline/스토리, 수동 정책 실행, 정책 이벤트 큐)이 배치됩니다. 스트리밍 행은 버킷 점, 마지막 동기화 시간, 대략적인 백로그, 대기 알림 수, 가장 오래된 알림 경과, 종류별 배지(철회/갱신/백필), 일시정지/재개 버튼을 표시합니다.</desc>
  <style>
    .bg { fill: #fafafa; }
    .panel { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1; }
    .panel-dashed { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; stroke-dasharray: 4 3; }
    .text-title { font-size: 16px; fill: #18181b; font-weight: 700; }
    .text-section { font-size: 13px; fill: #18181b; font-weight: 600; }
    .text-meta { font-size: 11px; fill: #52525b; }
    .badge { fill: #f4f4f5; stroke: #d4d4d8; stroke-width: 1; rx: 8; ry: 8; }
    .badge-amber { fill: #fef3c7; stroke: #fcd34d; }
    .badge-sky { fill: #e0f2fe; stroke: #bae6fd; }
    .badge-slate { fill: #f1f5f9; stroke: #cbd5e1; }
    .badge-text { font-size: 10px; font-weight: 600; fill: #18181b; }
    .btn { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 4; ry: 4; }
    .btn-primary { fill: #18181b; stroke: #18181b; stroke-width: 1; rx: 4; ry: 4; }
    .btn-primary-text { fill: #ffffff; font-size: 11px; font-weight: 600; }
    .btn-text { fill: #18181b; font-size: 11px; font-weight: 600; }
    .dot-green { fill: #22c55e; }
    .dot-yellow { fill: #eab308; }
    .dot-red { fill: #ef4444; }
    .dot-muted { fill: #a1a1aa; }
  </style>

  <rect class="bg" width="760" height="520"/>

  <rect class="panel" x="16" y="16" width="728" height="488" rx="6"/>

  <text x="32" y="42" class="text-title">Phase 2 동기화 상태</text>
  <text x="32" y="60" class="text-meta">기회 기반 baseline / story 푸시, 수동 정책 실행 전송, withdraw_policy_event 알림 큐를 고객별로 표시.</text>

  <rect class="btn" x="480" y="28" width="180" height="28"/>
  <text x="492" y="46" class="btn-text">Acme Corp ▾</text>
  <rect class="btn" x="668" y="28" width="64" height="28"/>
  <text x="685" y="46" class="btn-text">새로 고침</text>

  <rect class="panel" x="32" y="80" width="696" height="86" rx="4"/>
  <text x="44" y="100" class="text-section">Baseline 이벤트</text>
  <circle class="dot-yellow" cx="44" cy="118" r="4"/>
  <text x="56" y="122" class="text-meta">지연 · 마지막 동기화 3분 전 · 약 12,000건, 약 12분 지연</text>
  <text x="44" y="138" class="text-meta">대기 알림 4건  (가장 오래된 6분 경과)</text>
  <rect class="badge badge-amber" x="44" y="146" width="78" height="16"/>
  <text x="56" y="158" class="badge-text">철회 2건</text>
  <rect class="badge badge-sky" x="128" y="146" width="78" height="16"/>
  <text x="140" y="158" class="badge-text">갱신 1건</text>
  <rect class="badge badge-slate" x="212" y="146" width="78" height="16"/>
  <text x="224" y="158" class="badge-text">백필 1건</text>
  <rect class="btn" x="640" y="100" width="76" height="26"/>
  <text x="652" y="117" class="btn-text">일시 정지</text>

  <rect class="panel" x="32" y="174" width="696" height="56" rx="4"/>
  <text x="44" y="194" class="text-section">스토리</text>
  <circle class="dot-green" cx="44" cy="212" r="4"/>
  <text x="56" y="216" class="text-meta">최신 상태 · 마지막 동기화 12초 전 · 최신</text>
  <rect class="btn" x="640" y="190" width="76" height="26"/>
  <text x="652" y="207" class="btn-text">일시 정지</text>

  <rect class="panel" x="32" y="238" width="696" height="56" rx="4"/>
  <text x="44" y="258" class="text-section">정책 실행 (수동)</text>
  <text x="44" y="276" class="text-meta">마지막 전송 실행: #run-abc, 2시간 전</text>
  <text x="44" y="290" class="text-meta">총 전송된 실행 수: 47</text>

  <rect class="panel" x="32" y="302" width="696" height="58" rx="4"/>
  <text x="44" y="322" class="text-section">정책 이벤트 철회</text>
  <text x="44" y="340" class="text-meta">대기 중인 철회: 3건  (가장 오래된 1분 경과)</text>
  <rect class="badge badge-amber" x="44" y="346" width="78" height="14"/>
  <text x="56" y="357" class="badge-text">철회 3건</text>

  <rect class="panel-dashed" x="32" y="372" width="696" height="58" rx="4"/>
  <text x="44" y="394" class="text-section">지금 동기화</text>
  <text x="44" y="412" class="text-meta">감사 로그가 기록되었습니다 — 드레인은 이 브라우저에서 실행됩니다.</text>
  <rect class="btn-primary" x="640" y="386" width="76" height="28"/>
  <text x="656" y="404" class="btn-primary-text">지금 동기화</text>

  <rect class="panel-dashed" x="32" y="440" width="696" height="50" rx="4"/>
  <text x="44" y="460" class="text-section">과거 윈도우 백필</text>
  <text x="44" y="478" class="text-meta">종류 ▾ · 시작 … · 끝(미포함) … · 백필</text>
</svg>
