<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Apply preview modal — planned dispatches (wireframe)</title>
  <desc id="desc">Wireframe of the Apply preview modal in its initial state, immediately after the operator opens it. Header reads "Apply preview" with a subtitle explaining that only the BFF dispatch sequence is shown. The body lists three planned dispatches in order: Manager (applyNode), Data Store (updateConfig), and TI Container (updateConfig). Footer holds Cancel and Apply buttons; Apply is enabled because at least one dispatch is planned.</desc>

  <style>
    .scrim { fill: #18181b; fill-opacity: 0.55; }
    .modal { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 10; ry: 10; }
    .divider { stroke: #e5e7eb; stroke-width: 1; }
    .row { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1; rx: 6; ry: 6; }
    .row-list { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 6; ry: 6; }
    .btn { fill: #ffffff; stroke: #3f3f46; stroke-width: 1; rx: 6; ry: 6; }
    .btn-primary { fill: #18181b; stroke: #18181b; stroke-width: 1; rx: 6; ry: 6; }
    .h1 { font-size: 18px; font-weight: 600; fill: #18181b; }
    .sub { font-size: 12px; fill: #52525b; }
    .heading { font-size: 13px; font-weight: 600; fill: #18181b; }
    .row-label { font-size: 13px; font-weight: 500; fill: #18181b; }
    .btn-text { font-size: 13px; fill: #18181b; }
    .btn-primary-text { font-size: 13px; fill: #ffffff; font-weight: 500; }
    .muted { font-size: 11px; fill: #71717a; font-style: italic; }
  </style>

  <!-- Scrim -->
  <rect class="scrim" x="0" y="0" width="880" height="480" />

  <!-- Modal -->
  <rect class="modal" x="120" y="40" width="640" height="400" />

  <!-- Header -->
  <g transform="translate(150, 76)">
    <text class="h1">Apply preview</text>
    <text class="sub" y="22">Review the dispatches the BFF will run before confirming.</text>
    <text class="sub" y="40">Only the dispatch sequence is shown — internal review-web steps are not.</text>
  </g>
  <line class="divider" x1="150" y1="140" x2="730" y2="140" />

  <!-- Body heading -->
  <g transform="translate(150, 168)">
    <text class="heading">Planned dispatches</text>
  </g>

  <!-- Row list -->
  <rect class="row-list" x="150" y="184" width="580" height="156" />
  <!-- Manager -->
  <g transform="translate(166, 200)">
    <text class="row-label">Manager (applyNode)</text>
  </g>
  <line class="divider" x1="150" y1="232" x2="730" y2="232" />
  <!-- Data Store -->
  <g transform="translate(166, 248)">
    <text class="row-label">Data Store (updateConfig)</text>
  </g>
  <line class="divider" x1="150" y1="280" x2="730" y2="280" />
  <!-- TI Container -->
  <g transform="translate(166, 296)">
    <text class="row-label">TI Container (updateConfig)</text>
  </g>

  <!-- Footer -->
  <line class="divider" x1="150" y1="372" x2="730" y2="372" />
  <g transform="translate(540, 388)">
    <rect class="btn" x="0" y="0" width="80" height="34" />
    <text class="btn-text" x="40" y="22" text-anchor="middle">Cancel</text>
    <rect class="btn-primary" x="92" y="0" width="80" height="34" />
    <text class="btn-primary-text" x="132" y="22" text-anchor="middle">Apply</text>
  </g>

  <!-- Caption -->
  <text class="muted" x="160" y="438">Wireframe stand-in — see screenshot debt note in the manual section.</text>
</svg>
