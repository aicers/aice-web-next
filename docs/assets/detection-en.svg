<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" role="img"
     aria-label="Wireframe stand-in for the Detection page">
  <title>Detection page (wireframe stand-in)</title>
  <desc>Schematic layout of the Detection page: left nav, saved/recommended rail,
        top bar with Filters button and active filter chip bar, hero Results list
        with two-line entries (severity · time · kind · confidence · triage, then
        source -> destination · sensor), header count / Updated / Refresh / CSV
        controls, and a collapsed Analytics strip. A real capture replaces this
        once a staging environment with seeded detection data is available.</desc>

  <defs>
    <style>
      .bg      { fill: #0f1420; }
      .panel   { fill: #151b2c; stroke: #2a3352; stroke-width: 1; }
      .row     { fill: #141a2a; stroke: #232c47; stroke-width: 1; }
      .dashed  { fill: none; stroke: #4a5578; stroke-width: 1.5;
                 stroke-dasharray: 6 4; }
      .chip    { fill: #1d2742; stroke: #3a486b; stroke-width: 1; rx: 12; ry: 12; }
      .chipPri { fill: #2749a8; stroke: #3f66c9; stroke-width: 1; rx: 12; ry: 12; }
      .sevHi   { fill: #7a1b27; stroke: #b14554; stroke-width: 1; rx: 4; ry: 4; }
      .sevMd   { fill: #7a5a1b; stroke: #b18b45; stroke-width: 1; rx: 4; ry: 4; }
      .sevLo   { fill: #2f4a30; stroke: #52754f; stroke-width: 1; rx: 4; ry: 4; }
      .label   { fill: #c8d0e4; font-family: system-ui, sans-serif; font-size: 14px; }
      .labelSm { fill: #8e97ae; font-family: system-ui, sans-serif; font-size: 12px; }
      .labelMono { fill: #c8d0e4; font-family: ui-monospace, monospace; font-size: 12px; }
      .labelMonoMuted { fill: #8e97ae; font-family: ui-monospace, monospace; font-size: 12px; }
      .labelLg { fill: #e7ebf5; font-family: system-ui, sans-serif; font-size: 16px;
                 font-weight: 600; }
      .sevText { fill: #f6e9eb; font-family: system-ui, sans-serif; font-size: 11px;
                 font-weight: 600; letter-spacing: 0.04em; }
      .muted   { fill: #6d7690; font-family: system-ui, sans-serif; font-size: 12px;
                 font-style: italic; }
      .watermark { fill: #6d7690; font-family: system-ui, sans-serif; font-size: 11px;
                   letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="900" />

  <!-- Left sidebar -->
  <rect class="panel" x="0" y="0" width="240" height="900" />
  <text class="labelLg" x="72" y="45">Clumit Security</text>
  <g class="label" font-family="system-ui, sans-serif" font-size="14">
    <text x="60" y="138">Home</text>
    <text x="60" y="200">Dashboard</text>
    <text x="60" y="262">Event</text>
  </g>
  <rect x="0" y="296" width="240" height="44" fill="#1a2340" />
  <text class="labelLg" x="60" y="324" font-size="14">Detection</text>
  <g class="label" font-family="system-ui, sans-serif" font-size="14">
    <text x="60" y="382">Triage</text>
    <text x="60" y="444">Report</text>
    <text x="60" y="506">Audit Logs</text>
    <text x="60" y="568">Settings</text>
  </g>

  <!-- Saved / Recommended rail -->
  <rect class="panel" x="240" y="0" width="280" height="900" />
  <text class="labelLg" x="266" y="38">Detection</text>
  <text class="labelSm" x="266" y="92" letter-spacing="0.08em">RECOMMENDED FILTER</text>
  <text class="labelSm" x="266" y="118">No filters yet.</text>
  <text class="labelSm" x="266" y="164" letter-spacing="0.08em">SAVED FILTERS</text>
  <text class="labelSm" x="266" y="190">No filters yet.</text>

  <!-- Top bar: Filters button + active filter chip bar -->
  <rect class="panel" x="552" y="80" width="112" height="36" rx="8" ry="8" />
  <text class="label" x="578" y="104">Filters</text>
  <rect class="chip" x="676" y="84" width="120" height="28" />
  <text class="label" x="696" y="103">Last 1 hour</text>
  <rect class="chip" x="808" y="84" width="176" height="28" />
  <text class="label" x="828" y="103">Keywords: auth-fail</text>
  <rect class="chip" x="996" y="84" width="144" height="28" />
  <text class="label" x="1016" y="103">Hostnames: 5</text>
  <rect class="chip" x="1152" y="84" width="160" height="28" />
  <text class="label" x="1172" y="103">Confidence 0.70 – 1.00</text>

  <!-- Results list region -->
  <rect class="dashed" x="552" y="132" width="860" height="568" rx="10" ry="10" />
  <!-- List header -->
  <rect x="552" y="132" width="860" height="44" fill="#121829" />
  <text class="labelLg" x="572" y="160" font-size="14">Detected Events 1-5 / 1,284</text>
  <text class="labelSm" x="1140" y="160">Updated 2 minutes ago</text>
  <rect class="chip" x="1196" y="142" width="80" height="24" />
  <text class="labelSm" x="1210" y="159">Refresh</text>
  <rect class="chip" x="1288" y="142" width="104" height="24" />
  <text class="labelSm" x="1302" y="159">Download CSV</text>

  <!-- Row 1: HIGH -->
  <rect class="row" x="552" y="184" width="860" height="68" />
  <rect class="sevHi" x="572" y="198" width="44" height="18" />
  <text class="sevText" x="581" y="211">HIGH</text>
  <text class="labelMono" x="628" y="211">2026-04-22 12:04:11</text>
  <text class="label" x="780" y="211">HTTP Threat</text>
  <text class="labelSm" x="872" y="211">Attack: sql-injection</text>
  <text class="labelSm" x="1312" y="211">0.92</text>
  <text class="labelSm" x="1352" y="211">⊙ 2 · 0.87</text>
  <text class="labelMono" x="572" y="237">10.0.0.5:54321 (US) → 203.0.113.45:80 (DE)</text>
  <text class="labelSm" x="1336" y="237">sensor-a</text>

  <!-- Row 2: MEDIUM -->
  <rect class="row" x="552" y="252" width="860" height="68" />
  <rect class="sevMd" x="572" y="266" width="68" height="18" />
  <text class="sevText" x="581" y="279">MEDIUM</text>
  <text class="labelMono" x="652" y="279">2026-04-22 12:02:48</text>
  <text class="label" x="804" y="279">Port Scan</text>
  <text class="labelSm" x="880" y="279">Reconnaissance</text>
  <text class="labelSm" x="1312" y="279">0.63</text>
  <text class="labelMono" x="572" y="305">10.0.0.5 → 203.0.113.10:22 (DE)</text>
  <text class="labelMonoMuted" x="820" y="305">+4 more</text>
  <text class="labelSm" x="1336" y="305">sensor-b</text>

  <!-- Row 3: LOW -->
  <rect class="row" x="552" y="320" width="860" height="68" />
  <rect class="sevLo" x="572" y="334" width="40" height="18" />
  <text class="sevText" x="581" y="347">LOW</text>
  <text class="labelMono" x="624" y="347">2026-04-22 11:58:03</text>
  <text class="label" x="776" y="347">Tor Connection</text>
  <text class="labelSm" x="888" y="347">Command &amp; Control</text>
  <text class="labelSm" x="1312" y="347">0.41</text>
  <text class="labelMono" x="572" y="373">10.0.0.8:61122 (US) → 198.51.100.7:443 (XX)</text>
  <text class="labelSm" x="1336" y="373">sensor-a</text>

  <!-- Row 4: HIGH -->
  <rect class="row" x="552" y="388" width="860" height="68" />
  <rect class="sevHi" x="572" y="402" width="44" height="18" />
  <text class="sevText" x="581" y="415">HIGH</text>
  <text class="labelMono" x="628" y="415">2026-04-22 11:52:31</text>
  <text class="label" x="780" y="415">Network Threat</text>
  <text class="labelSm" x="892" y="415">Attack: c2-beacon</text>
  <text class="labelSm" x="1312" y="415">0.88</text>
  <text class="labelSm" x="1352" y="415">⊙ 3 · 0.91</text>
  <text class="labelMono" x="572" y="441">10.0.0.12:49501 (US) → 192.0.2.100:8443 (RU)</text>
  <text class="labelSm" x="1336" y="441">sensor-c</text>

  <!-- Row 5: MEDIUM -->
  <rect class="row" x="552" y="456" width="860" height="68" />
  <rect class="sevMd" x="572" y="470" width="68" height="18" />
  <text class="sevText" x="581" y="483">MEDIUM</text>
  <text class="labelMono" x="652" y="483">2026-04-22 11:47:22</text>
  <text class="label" x="804" y="483">RDP Brute Force</text>
  <text class="labelSm" x="908" y="483">Credential Access</text>
  <text class="labelSm" x="1312" y="483">0.55</text>
  <text class="labelMono" x="572" y="509">10.0.0.5 → 203.0.113.1</text>
  <text class="labelMonoMuted" x="728" y="509">+1 more</text>
  <text class="labelSm" x="1336" y="509">sensor-b</text>

  <!-- Quick peek inset (wide-viewport inline pane hint) -->
  <text class="muted" x="982" y="672" text-anchor="middle">
    Clicking a row opens the Quick peek pane inline at ≥ 1280 px (overlay below).
  </text>

  <!-- Analytics strip (collapsed) -->
  <rect class="panel" x="552" y="716" width="860" height="52" rx="8" ry="8" />
  <text class="label" x="576" y="748">&#9654; Analytics</text>

  <!-- Wireframe watermark -->
  <text class="watermark" x="1412" y="884" text-anchor="end">
    WIREFRAME STAND-IN — replaced with a real capture once staging is available
  </text>
</svg>
