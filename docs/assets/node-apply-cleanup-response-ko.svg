<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">적용 시도 정리 엔드포인트 — 요청과 응답 예시</title>
  <desc id="desc">POST /api/internal/apply-attempts/cleanup 1회 호출 다이어그램. 위쪽 프레임은 Authorization Bearer 헤더를 포함한 curl 요청을 보여주고, 아래쪽 프레임은 네 개의 카운터를 담은 JSON 응답을 보여줍니다. recovered (stale-lock 행을 failed_terminal 로 회수한 수), expired (TTL 종료 처리된 행 수), purged (보존 마감을 지난 종료 행을 하드 삭제한 수), auditsRecovered (회수 패스가 node.apply 감사를 내구성 있게 마무리한 succeeded 행 수).</desc>

  <style>
    .surface { fill: #0b1020; }
    .panel { fill: #0f172a; stroke: #1e293b; stroke-width: 1; rx: 8; ry: 8; }
    .panel-divider { stroke: #1e293b; stroke-width: 1; }
    .label { font-size: 11px; fill: #94a3b8; font-weight: 600; letter-spacing: 0.04em; }
    .mono { font-family: "SF Mono", "Menlo", "Consolas", "Liberation Mono", monospace; font-size: 13px; fill: #e2e8f0; }
    .key { fill: #93c5fd; }
    .num { fill: #fcd34d; }
    .punc { fill: #94a3b8; }
    .cmd { fill: #34d399; }
    .url { fill: #fef3c7; }
    .hdr { fill: #c4b5fd; }
    .comment { fill: #64748b; font-style: italic; }
    .title { font-size: 16px; fill: #f8fafc; font-weight: 600; }
    .sub { font-size: 12px; fill: #94a3b8; }
  </style>

  <rect class="surface" x="0" y="0" width="880" height="380" />

  <!-- Heading -->
  <g transform="translate(40, 36)">
    <text class="title">적용 시도 정리 — 단일 패스</text>
    <text class="sub" y="20">POST /api/internal/apply-attempts/cleanup</text>
  </g>

  <!-- Request panel -->
  <g transform="translate(40, 88)">
    <rect class="panel" x="0" y="0" width="800" height="100" />
    <text class="label" x="16" y="22">요청 (REQUEST)</text>
    <g transform="translate(16, 50)">
      <text class="mono">
        <tspan class="cmd">curl</tspan>
        <tspan class="punc"> -X </tspan>
        <tspan class="hdr">POST</tspan>
        <tspan class="punc"> \</tspan>
      </text>
      <text class="mono" y="20">
        <tspan class="punc">  -H </tspan>
        <tspan class="url">"Authorization: Bearer $APPLY_INTERNAL_CLEANUP_TOKEN"</tspan>
        <tspan class="punc"> \</tspan>
      </text>
      <text class="mono" y="40">
        <tspan class="punc">  </tspan>
        <tspan class="url">"$BFF_BASE_URL/api/internal/apply-attempts/cleanup"</tspan>
      </text>
    </g>
  </g>

  <!-- Response panel -->
  <g transform="translate(40, 208)">
    <rect class="panel" x="0" y="0" width="800" height="148" />
    <text class="label" x="16" y="22">응답 (RESPONSE)  200 OK</text>
    <g transform="translate(16, 50)">
      <text class="mono"><tspan class="punc">{</tspan></text>
      <text class="mono" y="20">
        <tspan class="punc">  </tspan>
        <tspan class="key">"recovered"</tspan>
        <tspan class="punc">: </tspan>
        <tspan class="num">2</tspan>
        <tspan class="punc">,</tspan>
        <tspan class="comment">    // APPLY_EXECUTING_STALE_MS 초과 executing 행을 failed_terminal 로 회수</tspan>
      </text>
      <text class="mono" y="40">
        <tspan class="punc">  </tspan>
        <tspan class="key">"expired"</tspan>
        <tspan class="punc">:   </tspan>
        <tspan class="num">5</tspan>
        <tspan class="punc">,</tspan>
        <tspan class="comment">    // pending → expired 와 failed_retryable → failed_terminal</tspan>
      </text>
      <text class="mono" y="60">
        <tspan class="punc">  </tspan>
        <tspan class="key">"purged"</tspan>
        <tspan class="punc">:    </tspan>
        <tspan class="num">9</tspan>
        <tspan class="punc">,</tspan>
        <tspan class="comment">    // APPLY_ATTEMPT_RETENTION_MS 초과 종료 행 하드 삭제</tspan>
      </text>
      <text class="mono" y="80">
        <tspan class="punc">  </tspan>
        <tspan class="key">"auditsRecovered"</tspan>
        <tspan class="punc">: </tspan>
        <tspan class="num">1</tspan>
        <tspan class="comment">     // 회수 패스가 발행한 node.apply 감사 항목 수</tspan>
      </text>
      <text class="mono" y="100"><tspan class="punc">}</tspan></text>
    </g>
  </g>
</svg>
