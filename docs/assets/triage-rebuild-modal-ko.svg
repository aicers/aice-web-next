<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, 'Noto Sans KR', sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Triage 기간 재빌드 확인 모달 (와이어프레임)</title>
  <desc id="desc">관리자 전용 "이 기간 다시 빌드" 확인 모달의 와이어프레임. 모달은 해석된 단일 고객, 분석 기간, 동작 설명, /api/triage/baseline/rebuild/estimate에서 읽은 행 수 추정값, 탐지 저장소 보존 경고, 탭 종료 안내, 취소 / 확인 버튼을 표시합니다.</desc>

  <style>
    .scrim { fill: #18181b; fill-opacity: 0.55; }
    .panel { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1; rx: 8; ry: 8; }
    .panel-header { fill: #f4f4f5; stroke: #e5e7eb; stroke-width: 1; }
    .text-title { font-size: 16px; fill: #18181b; font-weight: 700; }
    .text-label { font-size: 11px; fill: #71717a; font-weight: 600; letter-spacing: 0.02em; }
    .text-body { font-size: 12px; fill: #27272a; }
    .text-mono { font-size: 12px; fill: #18181b; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .text-muted { font-size: 11px; fill: #71717a; }
    .text-warning { font-size: 12px; fill: #92400e; }
    .text-stat { font-size: 22px; fill: #18181b; font-weight: 700; }
    .warning-panel { fill: #fffbeb; stroke: #fde68a; stroke-width: 1; rx: 4; ry: 4; }
    .row-divider { stroke: #e5e7eb; stroke-width: 1; }
    .button-secondary { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 4; ry: 4; }
    .button-secondary-text { fill: #18181b; font-size: 12px; font-weight: 500; }
    .button-primary { fill: #b91c1c; stroke: none; rx: 4; ry: 4; }
    .button-primary-text { fill: #ffffff; font-size: 12px; font-weight: 500; }
  </style>

  <rect class="scrim" width="720" height="540"/>

  <g transform="translate(80, 60)">
    <rect class="panel" width="560" height="420"/>
    <rect class="panel-header" width="560" height="40"/>
    <text class="text-title" x="20" y="26">이 기간의 기준 코퍼스 재빌드</text>

    <g transform="translate(20, 60)">
      <text class="text-label" y="0">고객</text>
      <text class="text-mono" y="20">Acme Corp (id 42)</text>
      <text class="text-label" x="260" y="0">기간</text>
      <text class="text-mono" x="260" y="20">2026-05-13T00:00Z → 2026-05-14T00:00Z</text>
    </g>

    <line class="row-divider" x1="20" y1="100" x2="540" y2="100"/>

    <g transform="translate(20, 120)">
      <text class="text-label" y="0">동작 설명</text>
      <text class="text-body" y="20">이 기간의 이벤트를 탐지 저장소에서 다시 가져와</text>
      <text class="text-body" y="36">기준 코퍼스를 재구성합니다. 기존 행은 삭제 후</text>
      <text class="text-body" y="52">교체됩니다. 케이던스 워터마크는 영향을 받지</text>
      <text class="text-body" y="68">않습니다.</text>
    </g>

    <line class="row-divider" x1="20" y1="208" x2="540" y2="208"/>

    <g transform="translate(20, 228)">
      <text class="text-label" y="0">예상 영향</text>
      <text class="text-stat" y="28">12,438</text>
      <text class="text-muted" x="100" y="28">현재 기간의 행 수 (추정)</text>
    </g>

    <g transform="translate(20, 282)">
      <rect class="warning-panel" width="520" height="48"/>
      <text class="text-warning" x="12" y="20">이 기간은 탐지 저장소 보존 기한을 넘었을 수 있습니다.</text>
      <text class="text-warning" x="12" y="38">재빌드 결과가 현재 표시된 것보다 적을 수 있습니다.</text>
    </g>

    <text class="text-muted" x="20" y="350">재빌드가 끝날 때까지 이 탭을 열어 두십시오. 완료 전에 탭을</text>
    <text class="text-muted" x="20" y="364">닫으면 감사 로그에서 결과를 확인하십시오.</text>

    <g transform="translate(280, 376)">
      <rect class="button-secondary" width="100" height="32"/>
      <text class="button-secondary-text" x="42" y="20">취소</text>
      <rect class="button-primary" x="120" y="0" width="140" height="32"/>
      <text class="button-primary-text" x="148" y="20">기간 재빌드</text>
    </g>
  </g>
</svg>
