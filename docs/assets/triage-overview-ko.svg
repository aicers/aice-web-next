<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">트리아지 페이지 (와이어프레임)</title>
  <desc id="desc">기준 모드의 트리아지 페이지 와이어프레임: 상단의 페이지 제목과 안내 문구, 좌측의 기간 선택기와 우측의 기준 / 내 정책 적용 탭 토글(정책은 비활성화), 탐지·트리아지·통과율 통계가 있는 퍼널 카드, 그 아래 점수순으로 정렬된 자산 목록과 자산별 통계 및 최근 트리아지 이벤트를 보여주는 자산 상세 패널의 2단 레이아웃.</desc>

  <style>
    .bg { fill: #fafafa; }
    .panel { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1; rx: 6; ry: 6; }
    .panel-header { fill: #f4f4f5; stroke: #e5e7eb; stroke-width: 1; }
    .text-title { font-size: 22px; fill: #18181b; font-weight: 700; }
    .text-intro { font-size: 12px; fill: #52525b; }
    .text-section { font-size: 11px; fill: #71717a; font-weight: 600; }
    .text-label { font-size: 11px; fill: #71717a; }
    .text-stat { font-size: 22px; fill: #18181b; font-weight: 700; }
    .text-mono { font-size: 12px; fill: #18181b; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .text-muted { font-size: 11px; fill: #a1a1aa; }
    .input { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 4; ry: 4; }
    .button-primary { fill: #18181b; stroke: none; rx: 4; ry: 4; }
    .button-primary-text { fill: #ffffff; font-size: 12px; font-weight: 500; }
    .tab-active { fill: #18181b; rx: 4; ry: 4; }
    .tab-inactive { fill: transparent; }
    .tab-text-active { fill: #ffffff; font-size: 12px; font-weight: 500; }
    .tab-text-inactive { fill: #a1a1aa; font-size: 12px; font-weight: 500; }
    .row-active { fill: #f4f4f5; }
    .row-divider { stroke: #e5e7eb; stroke-width: 1; }
  </style>

  <rect class="bg" width="960" height="640"/>

  <!-- Header -->
  <text class="text-title" x="24" y="38">트리아지</text>
  <text class="text-intro" x="24" y="58">선택한 기간의 이벤트에 대한 기준 점수입니다. 1.A 단계 — 기간은 최근 30일로 제한됩니다.</text>

  <!-- Period picker + mode toggle row -->
  <g transform="translate(24, 80)">
    <rect class="panel" width="540" height="64"/>
    <text class="text-label" x="16" y="20">시작</text>
    <rect class="input" x="16" y="26" width="180" height="26"/>
    <text class="text-mono" x="24" y="44">2026-05-08T12:00</text>
    <text class="text-label" x="208" y="20">종료</text>
    <rect class="input" x="208" y="26" width="180" height="26"/>
    <text class="text-mono" x="216" y="44">2026-05-09T12:00</text>
    <rect class="button-primary" x="408" y="26" width="64" height="26"/>
    <text class="button-primary-text" x="424" y="44">적용</text>
  </g>

  <g transform="translate(584, 80)">
    <rect class="panel" width="352" height="64"/>
    <text class="text-label" x="16" y="20">트리아지 모드</text>
    <rect class="tab-active" x="16" y="28" width="60" height="26"/>
    <text class="tab-text-active" x="32" y="46">기준</text>
    <rect class="tab-inactive" x="80" y="28" width="120" height="26"/>
    <text class="tab-text-inactive" x="92" y="46">내 정책 적용</text>
    <text class="text-muted" x="92" y="62">(정책 출시 후 사용 가능)</text>
  </g>

  <!-- Funnel -->
  <g transform="translate(24, 160)">
    <rect class="panel" width="912" height="92"/>
    <text class="text-section" x="16" y="22">퍼널</text>
    <g transform="translate(16, 36)">
      <text class="text-label" x="0" y="14">탐지</text>
      <text class="text-stat" x="0" y="42">12,438</text>
    </g>
    <g transform="translate(320, 36)">
      <text class="text-label" x="0" y="14">트리아지</text>
      <text class="text-stat" x="0" y="42">487</text>
    </g>
    <g transform="translate(624, 36)">
      <text class="text-label" x="0" y="14">통과율</text>
      <text class="text-stat" x="0" y="42">3.9%</text>
      <text class="text-muted" x="0" y="58">트리아지 ÷ 탐지</text>
    </g>
  </g>

  <!-- Asset list + asset detail -->
  <g transform="translate(24, 268)">
    <rect class="panel" width="404" height="348"/>
    <rect class="panel-header" width="404" height="36"/>
    <text class="text-section" x="16" y="24">점수순 자산</text>

    <g transform="translate(0, 36)">
      <rect class="row-active" width="404" height="56"/>
      <text class="text-mono" x="16" y="22">10.0.4.21</text>
      <text class="text-muted" x="16" y="40">412건 중 38건 트리아지</text>
      <text class="text-stat" x="380" y="34" text-anchor="end">82.5</text>
      <line class="row-divider" x1="0" y1="56" x2="404" y2="56"/>
    </g>
    <g transform="translate(0, 92)">
      <text class="text-mono" x="16" y="22">10.0.4.108</text>
      <text class="text-muted" x="16" y="40">244건 중 29건 트리아지</text>
      <text class="text-stat" x="380" y="34" text-anchor="end">61.0</text>
      <line class="row-divider" x1="0" y1="56" x2="404" y2="56"/>
    </g>
    <g transform="translate(0, 148)">
      <text class="text-mono" x="16" y="22">192.168.5.12</text>
      <text class="text-muted" x="16" y="40">187건 중 14건 트리아지</text>
      <text class="text-stat" x="380" y="34" text-anchor="end">21.0</text>
      <line class="row-divider" x1="0" y1="56" x2="404" y2="56"/>
    </g>
    <g transform="translate(0, 204)">
      <text class="text-mono" x="16" y="22">10.0.4.55</text>
      <text class="text-muted" x="16" y="40">96건 중 8건 트리아지</text>
      <text class="text-stat" x="380" y="34" text-anchor="end">12.0</text>
    </g>

    <g transform="translate(420, 0)">
      <rect class="panel" width="492" height="348"/>
      <text class="text-section" x="16" y="22">자산 상세</text>
      <text class="text-mono" x="16" y="48" font-size="16">10.0.4.21</text>

      <g transform="translate(16, 64)">
        <text class="text-label" x="0" y="14">점수</text>
        <text class="text-stat" x="0" y="38" font-size="18">82.5</text>
        <text class="text-label" x="160" y="14">트리아지</text>
        <text class="text-stat" x="160" y="38" font-size="18">38</text>
        <text class="text-label" x="304" y="14">탐지</text>
        <text class="text-stat" x="304" y="38" font-size="18">412</text>
      </g>

      <text class="text-section" x="16" y="142">이벤트</text>
      <g transform="translate(16, 152)">
        <text class="text-label" x="0" y="14">시각</text>
        <text class="text-label" x="180" y="14">종류</text>
        <text class="text-label" x="320" y="14">카테고리</text>
        <text class="text-label" x="460" y="14" text-anchor="end">점수</text>
        <line class="row-divider" x1="0" y1="20" x2="460" y2="20"/>

        <text class="text-mono" x="0" y="40" font-size="11">2026-05-09 11:58:12</text>
        <text class="text-mono" x="180" y="40" font-size="11">HttpThreat</text>
        <text class="text-mono" x="320" y="40" font-size="11">EXFILTRATION</text>
        <text class="text-mono" x="460" y="40" font-size="11" text-anchor="end">1.5</text>
        <line class="row-divider" x1="0" y1="48" x2="460" y2="48"/>

        <text class="text-mono" x="0" y="68" font-size="11">2026-05-09 11:42:03</text>
        <text class="text-mono" x="180" y="68" font-size="11">NetworkThreat</text>
        <text class="text-mono" x="320" y="68" font-size="11">COMMAND_AND_CONTROL</text>
        <text class="text-mono" x="460" y="68" font-size="11" text-anchor="end">1.0</text>
        <line class="row-divider" x1="0" y1="76" x2="460" y2="76"/>

        <text class="text-mono" x="0" y="96" font-size="11">2026-05-09 10:18:55</text>
        <text class="text-mono" x="180" y="96" font-size="11">HttpThreat</text>
        <text class="text-mono" x="320" y="96" font-size="11">INITIAL_ACCESS</text>
        <text class="text-mono" x="460" y="96" font-size="11" text-anchor="end">1.5</text>
      </g>
    </g>
  </g>
</svg>
