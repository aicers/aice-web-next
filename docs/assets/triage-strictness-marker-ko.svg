  <text x="640" y="220" class="text-th" text-anchor="end">점수</text>
  <line x1="40" y1="226" x2="680" y2="226" class="row-divider"/>

  <!-- Row 1: above cutoff, no marker -->
  <text x="40" y="246" class="text-mono">2026-05-09 11:58:02</text>
  <text x="220" y="246" class="text-kind">DnsCovertChannel</text>
  <text x="380" y="246" class="text-category-muted">EXFILTRATION</text>
  <text x="640" y="246" class="text-mono" text-anchor="end">0.97</text>
  <line x1="40" y1="254" x2="680" y2="254" class="row-divider"/>

  <!-- Row 2: below cutoff, Story member — chain-link marker -->
  <text x="40" y="274" class="marker">🔗</text>
  <text x="58" y="274" class="text-mono">2026-05-09 11:42:18</text>
  <text x="220" y="274" class="text-kind">HttpThreat</text>
  <text x="380" y="274" class="text-category-muted">IMPACT</text>
  <text x="640" y="274" class="text-mono" text-anchor="end">0.30</text>
  <line x1="40" y1="282" x2="680" y2="282" class="row-divider"/>

  <!-- Row 3: below cutoff, Story member — chain-link marker -->
  <text x="40" y="302" class="marker">🔗</text>
  <text x="58" y="302" class="text-mono">2026-05-09 11:31:55</text>
  <text x="220" y="302" class="text-kind">LockyRansomware</text>
  <text x="380" y="302" class="text-category-muted">IMPACT</text>
  <text x="640" y="302" class="text-mono" text-anchor="end">0.42</text>

  <!-- Hover tooltip indicator -->
  <rect class="tooltip-box" x="58" y="312" width="276" height="22"/>
  <text x="68" y="327" class="tooltip-text">스토리 멤버십으로 유지된 이벤트 (점수: 0.30)</text>
</svg>
