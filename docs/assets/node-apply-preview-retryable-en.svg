<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Apply preview modal — failed_retryable with Retry (wireframe)</title>
  <desc id="desc">Wireframe of the Apply preview modal after Apply settles to failed_retryable. The Manager row shows Succeeded (green), the Data Store row shows Failed (retryable) (amber) with an inline error message and a Retry button on the right of the row, and the TI Container row stays Queued (muted). The footer shows Close and Rebuild buttons; the per-row Retry is the primary recovery affordance.</desc>

  <style>
    .scrim { fill: #18181b; fill-opacity: 0.55; }
    .modal { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 10; ry: 10; }
    .divider { stroke: #e5e7eb; stroke-width: 1; }
    .row-list { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 6; ry: 6; }
    .btn { fill: #ffffff; stroke: #3f3f46; stroke-width: 1; rx: 6; ry: 6; }
    .btn-sm { fill: #ffffff; stroke: #3f3f46; stroke-width: 1; rx: 6; ry: 6; }
    .h1 { font-size: 18px; font-weight: 600; fill: #18181b; }
    .sub { font-size: 12px; fill: #52525b; }
    .heading { font-size: 13px; font-weight: 600; fill: #18181b; }
    .row-label { font-size: 13px; font-weight: 500; fill: #18181b; }
    .state-succeeded { font-size: 11px; fill: #059669; }
    .state-retryable { font-size: 11px; fill: #b45309; }
    .state-queued { font-size: 11px; fill: #71717a; }
    .err { font-size: 11px; fill: #b91c1c; }
    .btn-text { font-size: 13px; fill: #18181b; }
    .btn-sm-text { font-size: 12px; fill: #18181b; }
    .muted { font-size: 11px; fill: #71717a; font-style: italic; }
  </style>

  <!-- Scrim -->
  <rect class="scrim" x="0" y="0" width="880" height="540" />

  <!-- Modal -->
  <rect class="modal" x="80" y="32" width="720" height="476" />

  <!-- Header -->
  <g transform="translate(112, 68)">
    <text class="h1">Apply preview</text>
    <text class="sub" y="22">A dispatch failed; retry it from this row, or rebuild the preview to start over.</text>
  </g>
  <line class="divider" x1="112" y1="116" x2="768" y2="116" />

  <!-- Body heading -->
  <g transform="translate(112, 144)">
    <text class="heading">Dispatches</text>
  </g>

  <!-- Row list -->
  <rect class="row-list" x="112" y="160" width="656" height="208" />

  <!-- Manager : succeeded -->
  <g transform="translate(128, 176)">
    <text class="row-label">Manager (applyNode)</text>
    <text class="state-succeeded" y="18">Succeeded</text>
  </g>
  <line class="divider" x1="112" y1="224" x2="768" y2="224" />

  <!-- Data Store : failed_retryable + inline error + Retry button -->
  <g transform="translate(128, 240)">
    <text class="row-label">Data Store (updateConfig)</text>
    <text class="state-retryable" y="18">Failed (retryable)</text>
    <text class="err" y="36">Error: connection refused</text>
  </g>
  <g transform="translate(672, 248)">
    <rect class="btn-sm" x="0" y="0" width="76" height="28" />
    <text class="btn-sm-text" x="38" y="18" text-anchor="middle">Retry</text>
  </g>
  <line class="divider" x1="112" y1="304" x2="768" y2="304" />

  <!-- TI Container : queued -->
  <g transform="translate(128, 320)">
    <text class="row-label">TI Container (updateConfig)</text>
    <text class="state-queued" y="18">Queued</text>
  </g>

  <!-- Footer -->
  <line class="divider" x1="112" y1="408" x2="768" y2="408" />
  <g transform="translate(560, 424)">
    <rect class="btn" x="0" y="0" width="80" height="34" />
    <text class="btn-text" x="40" y="22" text-anchor="middle">Close</text>
    <rect class="btn" x="92" y="0" width="100" height="34" />
    <text class="btn-text" x="142" y="22" text-anchor="middle">Rebuild</text>
  </g>

  <!-- Caption -->
  <text class="muted" x="120" y="494">Wireframe stand-in — see screenshot debt note in the manual section.</text>
</svg>
