<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 120" width="720" height="120" font-family="Inter, 'Noto Sans KR', sans-serif" font-size="13">
  <title>센서 에이전트가 유휴 상태인 상태 행 (와이어프레임 대체)</title>
  <desc>상태 탭의 한 노드 행. 센서 서비스 셀에 황색 점과 "유휴" 라벨이 표시되며, 호버 시 툴팁은 "에이전트 재적용이 실패했습니다" 로 나타납니다. 실제 캡처 전 임시 와이어프레임입니다.</desc>
  <rect x="0" y="0" width="720" height="120" fill="#fafafa" stroke="#e5e7eb"/>
  <rect x="0" y="0" width="720" height="32" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="16" y="20" fill="#6b7280">노드</text>
  <text x="160" y="20" fill="#6b7280">CPU</text>
  <text x="240" y="20" fill="#6b7280">메모리</text>
  <text x="340" y="20" fill="#6b7280">디스크</text>
  <text x="430" y="20" fill="#6b7280">매니저</text>
  <text x="520" y="20" fill="#6b7280">센서</text>
  <text x="610" y="20" fill="#6b7280">데이터 저장소</text>
  <text x="16" y="68" fill="#111827">alpha-node</text>
  <text x="16" y="86" fill="#9ca3af" font-size="11">alpha.lan</text>
  <text x="160" y="68" fill="#111827">12.5%</text>
  <text x="240" y="68" fill="#111827">8.0 / 16.0 GB</text>
  <text x="340" y="68" fill="#111827">256 / 1024 GB</text>
  <rect x="430" y="58" width="64" height="20" rx="9" fill="none" stroke="#10b981"/>
  <text x="448" y="72" fill="#047857">실행 중</text>
  <circle cx="528" cy="68" r="5" fill="#f59e0b"/>
  <text x="540" y="72" fill="#111827">유휴</text>
  <circle cx="618" cy="68" r="5" fill="#10b981"/>
  <text x="630" y="72" fill="#111827">켜짐</text>
</svg>
