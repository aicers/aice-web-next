<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">행별 조사 딥링크가 있는 자산 상세 이벤트 행 (와이어프레임)</title>
  <desc id="desc">자산 상세 패널 이벤트 표의 와이어프레임. 끝에 추가된 "조사" 컬럼이 각 행에 외부 링크 액션 버튼을 더합니다. 행 전체도 링크처럼 동작합니다: 행의 아무 곳이나 클릭하거나 포커스 상태에서 Enter/Space를 누르면 해당 이벤트의 전체 이벤트 조사 화면이 새 브라우저 탭에서 열립니다. 액션 버튼의 툴팁에는 "이 이벤트의 전체 조사 화면을 새 탭에서 엽니다."가 표시됩니다.</desc>
  <style>
    .bg { fill: #fafafa; }
    .panel { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1; }
    .text-section { font-size: 11px; fill: #71717a; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
    .text-address { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 16px; fill: #18181b; }
    .text-meta { font-size: 11px; fill: #71717a; }
    .text-th { font-size: 10px; fill: #71717a; font-weight: 600; letter-spacing: 0.5px; }
    .text-mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; fill: #18181b; }
    .text-kind { font-size: 11px; fill: #18181b; }
    .text-category-muted { font-size: 11px; fill: #71717a; }
    .row-divider { stroke: #f4f4f5; stroke-width: 1; }
    .row-focus { fill: #f4f4f5; stroke: #2563eb; stroke-width: 1.5; }
    .action-btn { fill: none; stroke: #d4d4d8; stroke-width: 1; }
    .action-icon { stroke: #2563eb; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .tooltip-box { fill: #18181b; }
    .tooltip-text { fill: #ffffff; font-size: 10px; }
  </style>

  <rect class="bg" width="720" height="320"/>

  <!-- 자산 상세 패널 -->
  <rect class="panel" x="24" y="20" width="672" height="280" rx="6" ry="6"/>

  <!-- 헤더 -->
  <text x="40" y="46" class="text-section">자산 상세</text>
  <text x="40" y="72" class="text-address">10.0.0.42</text>
  <text x="40" y="90" class="text-meta">고객사: Default</text>

  <!-- 이벤트 제목 -->
  <text x="40" y="124" class="text-section">이벤트</text>

  <!-- 표 헤더 -->
  <text x="40" y="146" class="text-th">시각</text>
  <text x="210" y="146" class="text-th">종류</text>
  <text x="360" y="146" class="text-th">카테고리</text>
  <text x="560" y="146" class="text-th" text-anchor="end">점수</text>
  <text x="664" y="146" class="text-th" text-anchor="end">조사</text>
  <line x1="40" y1="152" x2="664" y2="152" class="row-divider"/>

  <!-- 1행: 포커스/호버 — 행 전체가 링크 -->
  <rect class="row-focus" x="34" y="160" width="636" height="24" rx="3" ry="3"/>
  <text x="44" y="176" class="text-mono">2026-05-09 11:58:02</text>
  <text x="210" y="176" class="text-kind">DnsCovertChannel</text>
  <text x="360" y="176" class="text-category-muted">EXFILTRATION</text>
  <text x="560" y="176" class="text-mono" text-anchor="end">0.97</text>
  <rect class="action-btn" x="640" y="163" width="20" height="18" rx="3" ry="3"/>
  <path class="action-icon" d="M650 169 h5 v5 M655 169 l-6 6 M647 169 h-1 a1 1 0 0 0 -1 1 v4 a1 1 0 0 0 1 1 h4 a1 1 0 0 0 1 -1 v-1"/>

  <!-- 2행 -->
  <text x="44" y="206" class="text-mono">2026-05-09 11:42:18</text>
  <text x="210" y="206" class="text-kind">HttpThreat</text>
  <text x="360" y="206" class="text-category-muted">IMPACT</text>
  <text x="560" y="206" class="text-mono" text-anchor="end">0.88</text>
  <rect class="action-btn" x="640" y="193" width="20" height="18" rx="3" ry="3"/>
  <path class="action-icon" d="M650 199 h5 v5 M655 199 l-6 6 M647 199 h-1 a1 1 0 0 0 -1 1 v4 a1 1 0 0 0 1 1 h4 a1 1 0 0 0 1 -1 v-1"/>
  <line x1="40" y1="216" x2="664" y2="216" class="row-divider"/>

  <!-- 3행 -->
  <text x="44" y="236" class="text-mono">2026-05-09 11:31:55</text>
  <text x="210" y="236" class="text-kind">LockyRansomware</text>
  <text x="360" y="236" class="text-category-muted">IMPACT</text>
  <text x="560" y="236" class="text-mono" text-anchor="end">0.74</text>
  <rect class="action-btn" x="640" y="223" width="20" height="18" rx="3" ry="3"/>
  <path class="action-icon" d="M650 229 h5 v5 M655 229 l-6 6 M647 229 h-1 a1 1 0 0 0 -1 1 v4 a1 1 0 0 0 1 1 h4 a1 1 0 0 0 1 -1 v-1"/>

  <!-- 포커스된 행의 액션 버튼 툴팁 -->
  <rect class="tooltip-box" x="436" y="246" width="252" height="22" rx="4" ry="4"/>
  <text x="446" y="261" class="tooltip-text">이 이벤트의 전체 조사 화면을 새 탭에서 엽니다.</text>
</svg>
