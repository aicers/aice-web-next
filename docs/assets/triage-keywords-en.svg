<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Tier 2 Keywords free-form input section (wireframe)</title>
  <desc id="desc">Wireframe of the Tier 2 only free-form Keywords section in the Triage related-events panel. The section renders a single text input plus a Search button, an inline validation slot below the input, and a "Recent" strip of clickable chips representing the most-recent operator-typed values. Submitting Enter or clicking Search dispatches a server-filtered Tier 2 fetch; clicking a recent chip re-fires the same fetch.</desc>
  <style>
    .bg { fill: #fafafa; }
    .panel { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1; rx: 6; ry: 6; }
    .panel-header { fill: #f4f4f5; stroke: #e5e7eb; stroke-width: 1; }
    .text-title { font-size: 16px; fill: #18181b; font-weight: 700; }
    .text-section { font-size: 13px; fill: #18181b; font-weight: 600; }
    .text-family { font-size: 11px; fill: #71717a; }
    .text-hint { font-size: 11px; fill: #71717a; }
    .text-muted { font-size: 11px; fill: #a1a1aa; }
    .row-divider { stroke: #e5e7eb; stroke-width: 1; }
    .input-box { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 4; ry: 4; }
    .input-text { fill: #a1a1aa; font-size: 12px; font-style: italic; }
    .btn-primary { fill: #18181b; stroke: #18181b; stroke-width: 1; rx: 4; ry: 4; }
    .btn-primary-text { fill: #ffffff; font-size: 12px; font-weight: 600; }
    .chip { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 4; ry: 4; }
    .chip-text { fill: #18181b; font-size: 12px; }
  </style>

  <rect class="bg" width="720" height="360"/>

  <!-- Card -->
  <rect class="panel" x="20" y="20" width="680" height="320"/>
  <rect class="panel-header" x="20" y="20" width="680" height="40"/>
  <text class="text-title" x="36" y="46">Related events</text>
  <text class="text-muted" x="36" y="58">Tier 2 mode</text>

  <!-- Existing focus-driven section divider -->
  <text class="text-muted" x="36" y="92">… focus-driven sections (External IP, JA3, …) …</text>
  <line class="row-divider" x1="20" y1="108" x2="700" y2="108"/>

  <!-- Tier 2 only — Keywords -->
  <g transform="translate(36, 124)">
    <text class="text-section" x="0" y="14">Keywords</text>
    <text class="text-family" x="0" y="32">Tier 2 only</text>
    <text class="text-hint" x="0" y="50">Search any token across event fields. Submit dispatches a Tier 2 fetch.</text>

    <!-- Input + Search button row -->
    <rect class="input-box" x="0" y="64" width="448" height="32"/>
    <text class="input-text" x="12" y="85">Type a keyword and press Enter…</text>

    <rect class="btn-primary" x="460" y="64" width="92" height="32"/>
    <text class="btn-primary-text" x="506" y="85" text-anchor="middle">Search</text>

    <!-- Inline validation slot -->
    <text class="text-muted" x="0" y="116">(inline validation message appears here on empty / too-long input)</text>

    <!-- Recent chips strip -->
    <text class="text-section" x="0" y="148">Recent</text>
    <rect class="chip" x="0" y="160" width="136" height="26"/>
    <text class="chip-text" x="68" y="178" text-anchor="middle">lateral movement</text>

    <rect class="chip" x="148" y="160" width="92" height="26"/>
    <text class="chip-text" x="194" y="178" text-anchor="middle">powershell</text>

    <rect class="chip" x="252" y="160" width="68" height="26"/>
    <text class="chip-text" x="286" y="178" text-anchor="middle">mimikatz</text>

    <text class="text-muted" x="0" y="208">Up to 5 most-recent submissions. Page-session only — not encoded</text>
    <text class="text-muted" x="0" y="224">in the URL hash and cleared on period / customer scope rotate.</text>
  </g>
</svg>
