<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14">
  <rect width="1200" height="220" fill="#0d1117"/>

  <!-- Breadcrumb bar -->
  <rect x="0" y="0" width="1200" height="64" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="32" y="40" fill="#8b949e">Detection</text>
  <text x="106" y="40" fill="#8b949e">›</text>
  <text x="124" y="40" fill="#c9d1d9" font-weight="600">Search</text>

  <!-- Indicator pill (right-aligned) -->
  <g transform="translate(900,28)">
    <rect width="260" height="28" rx="14" fill="#21262d" stroke="#30363d"/>
    <text x="14" y="18" fill="#c9d1d9">⌥ Customers: ACME, Beta, Gamma</text>
    <text x="240" y="18" fill="#8b949e">▾</text>
  </g>

  <!-- Page-level callout -->
  <g transform="translate(32,96)">
    <rect width="1136" height="36" rx="6" fill="#0d1117" stroke="#30363d"/>
    <text x="14" y="23" fill="#8b949e">ⓘ  Showing data across 3 customers. Click the customer indicator above for details.</text>
  </g>

  <!-- Popover preview -->
  <g transform="translate(900,148)">
    <rect width="260" height="60" rx="6" fill="#161b22" stroke="#30363d"/>
    <text x="14" y="22" fill="#c9d1d9" font-size="11" font-weight="600">CUSTOMER SCOPE</text>
    <text x="14" y="42" fill="#8b949e" font-size="11">Assigned via account</text>
    <text x="14" y="56" fill="#58a6ff" font-size="11">Manage customers</text>
  </g>

  <text x="32" y="204" fill="#6e7681" font-size="11">Wireframe stand-in (issue #383). Replace with a real PNG capture once an auth_db with multi-customer fixtures is available.</text>
</svg>
