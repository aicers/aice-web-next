<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">세계 지도가 포함된 엔드포인트 탭 — 와이어프레임</title>
  <desc id="desc">이벤트 조사 페이지의 엔드포인트 탭 와이어프레임. 상단에 출발지(원)와 목적지(다이아몬드) 마커가 배치된 세계 지도 패널과 범례가 있고, 그 아래에 출발지/목적지 카드가 2열 그리드로 표시됩니다.</desc>

  <style>
    .page { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1; }
    .panel { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 6; ry: 6; }
    .map-bg { fill: #f4f4f5; stroke: #d4d4d8; stroke-width: 1; }
    .land { fill: #e4e4e7; stroke: #d4d4d8; stroke-width: 0.75; }
    .src { fill: #0ea5e9; stroke: #ffffff; stroke-width: 1.5; }
    .dst { fill: #f43f5e; stroke: #ffffff; stroke-width: 1.5; }
    .h2 { font-size: 14px; font-weight: 600; fill: #18181b; }
    .lbl { font-size: 12px; fill: #52525b; }
    .val { font-size: 12px; fill: #18181b; }
    .muted { font-size: 11px; fill: #71717a; }
    .note { font-size: 11px; font-style: italic; fill: #a16207; }
  </style>

  <rect x="0" y="0" width="1200" height="720" fill="#fafafa" />
  <rect x="24" y="24" width="1152" height="672" class="page" rx="8" ry="8" />

  <rect x="48" y="48" width="1104" height="300" class="panel" />
  <text x="64" y="76" class="h2">엔드포인트 지도</text>

  <g transform="translate(920, 66)">
    <circle cx="0" cy="0" r="5" class="src" />
    <text x="10" y="4" class="muted">출발지</text>
    <g transform="translate(78, 0) rotate(45)">
      <rect x="-4" y="-4" width="8" height="8" class="dst" />
    </g>
    <text x="92" y="4" class="muted">목적지</text>
  </g>

  <g transform="translate(64, 92)">
    <rect x="0" y="0" width="1072" height="240" class="map-bg" rx="4" ry="4" />
    <path class="land" d="M90,80 q30,-30 70,-20 q40,10 60,40 q10,30 -20,60 q-50,20 -80,10 q-50,-20 -40,-60 q0,-20 10,-30z" />
    <path class="land" d="M240,70 q40,-25 80,-10 q40,20 60,60 q0,30 -30,50 q-60,20 -90,0 q-40,-20 -40,-60 q0,-30 20,-40z" />
    <path class="land" d="M430,60 q80,-20 170,-10 q90,10 150,40 q30,30 -20,60 q-120,40 -250,30 q-80,-10 -90,-50 q-5,-40 40,-70z" />
    <path class="land" d="M760,70 q80,-10 150,20 q50,30 40,70 q-30,40 -120,50 q-80,0 -110,-40 q-20,-40 10,-70 q15,-20 30,-30z" />
    <path class="land" d="M360,160 q20,-10 50,0 q30,20 20,50 q-10,20 -40,30 q-40,0 -50,-30 q-10,-30 20,-50z" />
    <path class="land" d="M880,170 q30,-10 60,0 q30,20 20,40 q-20,20 -50,20 q-30,0 -40,-20 q-10,-20 10,-40z" />

    <g>
      <circle cx="180" cy="110" r="5" class="src"><title>10.0.0.1 · KR</title></circle>
      <circle cx="260" cy="130" r="5" class="src"><title>10.0.0.2 · KR</title></circle>
      <circle cx="470" cy="95" r="5" class="src"><title>10.0.0.3 · DE</title></circle>
    </g>
    <g>
      <g transform="translate(820, 100) rotate(45)"><rect x="-4" y="-4" width="8" height="8" class="dst"><title>203.0.113.10 · US</title></rect></g>
      <g transform="translate(900, 130) rotate(45)"><rect x="-4" y="-4" width="8" height="8" class="dst"><title>203.0.113.11 · US</title></rect></g>
      <g transform="translate(760, 170) rotate(45)"><rect x="-4" y="-4" width="8" height="8" class="dst"><title>203.0.113.12 · US</title></rect></g>
      <g transform="translate(400, 175) rotate(45)"><rect x="-4" y="-4" width="8" height="8" class="dst"><title>198.51.100.5 · FR</title></rect></g>
    </g>
  </g>

  <rect x="48" y="372" width="540" height="300" class="panel" />
  <text x="64" y="400" class="h2">출발지</text>
  <g transform="translate(64, 420)">
    <text x="0" y="18" class="lbl">IP</text>        <text x="120" y="18" class="val">10.0.0.1</text>
    <text x="0" y="42" class="lbl">국가</text>      <text x="120" y="42" class="val">KR · 대한민국</text>
    <text x="0" y="66" class="lbl">지역</text>      <text x="120" y="66" class="val">서울</text>
    <text x="0" y="90" class="lbl">도시</text>      <text x="120" y="90" class="val">서울</text>
    <text x="0" y="114" class="lbl">좌표</text>     <text x="120" y="114" class="val">37.5665, 126.9780</text>
    <text x="0" y="138" class="lbl">포트</text>     <text x="120" y="138" class="val">443</text>
    <text x="0" y="162" class="lbl">회사</text>     <text x="120" y="162" class="val">Example Corp (고객 기준)</text>
  </g>

  <rect x="612" y="372" width="540" height="300" class="panel" />
  <text x="628" y="400" class="h2">목적지</text>
  <g transform="translate(628, 420)">
    <text x="0" y="18" class="lbl">IP</text>        <text x="120" y="18" class="val">203.0.113.10</text>
    <text x="0" y="42" class="lbl">국가</text>      <text x="120" y="42" class="val">US · 미국</text>
    <text x="0" y="66" class="lbl">지역</text>      <text x="120" y="66" class="val">캘리포니아</text>
    <text x="0" y="90" class="lbl">도시</text>      <text x="120" y="90" class="val">샌프란시스코</text>
    <text x="0" y="114" class="lbl">좌표</text>     <text x="120" y="114" class="val">37.7749, -122.4194</text>
    <text x="0" y="138" class="lbl">포트</text>     <text x="120" y="138" class="val">80, 443</text>
    <text x="0" y="162" class="lbl">회사</text>     <text x="120" y="162" class="val">Example ISP (IP 보강 기준)</text>
  </g>

  <text x="64" y="700" class="note">와이어프레임 대체물 — 스테이징 환경이 준비되는 대로 실제 캡처로 교체하세요.</text>
</svg>
