<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" role="img" aria-labelledby="save-filter-dialog-title">
  <title id="save-filter-dialog-title">필터 저장 대화상자 와이어프레임</title>
  <defs>
    <style>
      .frame { fill: #1f2937; stroke: #4b5563; stroke-width: 1; }
      .panel { fill: #111827; stroke: #4b5563; stroke-width: 1; }
      .field { fill: #374151; stroke: #6b7280; stroke-width: 1; }
      .text { fill: #e5e7eb; font-family: 'Helvetica Neue', sans-serif; font-size: 14px; }
      .hint { fill: #9ca3af; font-family: 'Helvetica Neue', sans-serif; font-size: 12px; }
      .btn-primary { fill: #2563eb; stroke: #1d4ed8; stroke-width: 1; }
      .btn-secondary { fill: transparent; stroke: #6b7280; stroke-width: 1; }
      .btn-text { fill: #f9fafb; font-family: 'Helvetica Neue', sans-serif; font-size: 13px; }
      .btn-text-muted { fill: #d1d5db; font-family: 'Helvetica Neue', sans-serif; font-size: 13px; }
    </style>
  </defs>
  <rect class="frame" width="480" height="280" rx="8" />
  <rect class="panel" x="20" y="20" width="440" height="240" rx="6" />
  <text class="text" x="40" y="56" font-weight="600">이 필터 저장</text>
  <text class="hint" x="40" y="80">저장된 필터는 왼쪽 레일에 표시되며 나중에 불러올 수 있습니다.</text>
  <text class="text" x="40" y="124">이름</text>
  <rect class="field" x="40" y="138" width="400" height="36" rx="4" />
  <text class="text" x="52" y="161">Last 1h · High</text>
  <rect class="btn-secondary" x="244" y="206" width="92" height="34" rx="4" />
  <text class="btn-text-muted" x="277" y="227">취소</text>
  <rect class="btn-primary" x="348" y="206" width="92" height="34" rx="4" />
  <text class="btn-text" x="383" y="227">저장</text>
</svg>
