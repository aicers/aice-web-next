<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 360" role="img" aria-labelledby="saved-filters-rail-title">
  <title id="saved-filters-rail-title">Saved Filters rail wireframe</title>
  <defs>
    <style>
      .frame { fill: #0b1220; stroke: #4b5563; stroke-width: 1; }
      .row { fill: transparent; stroke: transparent; }
      .row-hover { fill: #1f2937; }
      .heading { fill: #9ca3af; font-family: 'Helvetica Neue', sans-serif; font-size: 11px; letter-spacing: 1px; font-weight: 600; }
      .text { fill: #e5e7eb; font-family: 'Helvetica Neue', sans-serif; font-size: 13px; }
      .icon { fill: #9ca3af; }
      .menu-bg { fill: #1f2937; stroke: #4b5563; stroke-width: 1; }
      .menu-text { fill: #f9fafb; font-family: 'Helvetica Neue', sans-serif; font-size: 13px; }
      .menu-divider { stroke: #4b5563; stroke-width: 1; }
      .destructive { fill: #f87171; font-family: 'Helvetica Neue', sans-serif; font-size: 13px; }
    </style>
  </defs>
  <rect class="frame" width="320" height="360" rx="6" />
  <text class="heading" x="20" y="38" text-transform="uppercase">RECOMMENDED FILTER</text>
  <text class="heading" x="20" y="92" text-transform="uppercase">SAVED FILTERS</text>
  <rect class="row-hover" x="12" y="104" width="180" height="28" rx="4" />
  <text class="text" x="20" y="123">Last 1h · High</text>
  <rect class="row-hover" x="12" y="138" width="180" height="28" rx="4" opacity="0.6" />
  <text class="text" x="20" y="157">DNS exfiltration watch</text>
  <rect class="row-hover" x="12" y="172" width="180" height="28" rx="4" opacity="0.6" />
  <text class="text" x="20" y="191">Internal lateral · 24h</text>

  <text class="icon" x="200" y="123">⋮</text>
  <text class="icon" x="200" y="157">⋮</text>
  <text class="icon" x="200" y="191">⋮</text>

  <!-- popover menu attached to the first row -->
  <rect class="menu-bg" x="216" y="108" width="92" height="160" rx="4" />
  <text class="menu-text" x="226" y="128">Load in new tab</text>
  <text class="menu-text" x="226" y="150">Load in current tab</text>
  <line class="menu-divider" x1="220" y1="160" x2="304" y2="160" />
  <text class="menu-text" x="226" y="180">Rename</text>
  <text class="destructive" x="226" y="202">Delete</text>
</svg>
