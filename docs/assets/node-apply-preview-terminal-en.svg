<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Apply preview modal — failed_terminal with Rebuild guidance (wireframe)</title>
  <desc id="desc">Wireframe of the Apply preview modal after Apply settles to failed_terminal. The Manager row shows Succeeded (green); the Data Store and TI Container rows both show Failed (terminal) (red) with read-only error messages and no Retry button. A top-level guidance line reads "Rebuild the preview to apply", and a Rebuild button is rendered below the row list. The footer holds only a Close button.</desc>

  <style>
    .scrim { fill: #18181b; fill-opacity: 0.55; }
    .modal { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 10; ry: 10; }
    .divider { stroke: #e5e7eb; stroke-width: 1; }
    .row-list { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 6; ry: 6; }
    .btn { fill: #ffffff; stroke: #3f3f46; stroke-width: 1; rx: 6; ry: 6; }
    .h1 { font-size: 18px; font-weight: 600; fill: #18181b; }
    .sub { font-size: 12px; fill: #52525b; }
    .heading { font-size: 13px; font-weight: 600; fill: #18181b; }
    .guidance { font-size: 12px; fill: #18181b; }
    .row-label { font-size: 13px; font-weight: 500; fill: #18181b; }
    .state-succeeded { font-size: 11px; fill: #059669; }
    .state-terminal { font-size: 11px; fill: #b91c1c; }
    .err { font-size: 11px; fill: #b91c1c; }
    .btn-text { font-size: 13px; fill: #18181b; }
    .muted { font-size: 11px; fill: #71717a; font-style: italic; }
  </style>

  <!-- Scrim -->
  <rect class="scrim" x="0" y="0" width="880" height="540" />

  <!-- Modal -->
  <rect class="modal" x="80" y="32" width="720" height="476" />

  <!-- Header -->
  <g transform="translate(112, 68)">
    <text class="h1">Apply preview</text>
    <text class="sub" y="22">Apply could not complete.</text>
  </g>
  <line class="divider" x1="112" y1="116" x2="768" y2="116" />

  <!-- Top-level guidance -->
  <g transform="translate(112, 144)">
    <text class="guidance">Rebuild the preview to apply.</text>
  </g>

  <!-- Row list -->
  <rect class="row-list" x="112" y="160" width="656" height="208" />

  <!-- Manager : succeeded -->
  <g transform="translate(128, 176)">
    <text class="row-label">Manager (applyNode)</text>
    <text class="state-succeeded" y="18">Succeeded</text>
  </g>
  <line class="divider" x1="112" y1="224" x2="768" y2="224" />

  <!-- Data Store : failed_terminal -->
  <g transform="translate(128, 240)">
    <text class="row-label">Data Store (updateConfig)</text>
    <text class="state-terminal" y="18">Failed (terminal)</text>
    <text class="err" y="36">Error: cap reached</text>
  </g>
  <line class="divider" x1="112" y1="304" x2="768" y2="304" />

  <!-- TI Container : failed_terminal -->
  <g transform="translate(128, 320)">
    <text class="row-label">TI Container (updateConfig)</text>
    <text class="state-terminal" y="18">Failed (terminal)</text>
  </g>

  <!-- Rebuild button under the row list -->
  <g transform="translate(112, 384)">
    <rect class="btn" x="0" y="0" width="100" height="34" />
    <text class="btn-text" x="50" y="22" text-anchor="middle">Rebuild</text>
  </g>

  <!-- Footer -->
  <line class="divider" x1="112" y1="440" x2="768" y2="440" />
  <g transform="translate(688, 456)">
    <rect class="btn" x="0" y="0" width="80" height="34" />
    <text class="btn-text" x="40" y="22" text-anchor="middle">Close</text>
  </g>

  <!-- Caption -->
  <text class="muted" x="120" y="498">Wireframe stand-in — see screenshot debt note in the manual section.</text>
</svg>
