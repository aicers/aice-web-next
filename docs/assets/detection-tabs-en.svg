<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" role="img"
     aria-label="Wireframe stand-in for the Detection multi-tab bar">
  <title>Detection multi-tab bar (wireframe stand-in)</title>
  <desc>Schematic layout of the multi-tab bar above the Detection results area:
        three tabs with auto-generated and manually renamed titles, each with a
        close affordance; the active tab has an underline; the leftmost tab
        carries a reset-name affordance. A + affordance opens a new blank tab;
        when the 8-tab cap is reached the + renders disabled with a tooltip.</desc>

  <defs>
    <style>
      .bg        { fill: #0f1420; }
      .panel     { fill: #151b2c; stroke: #2a3352; stroke-width: 1; }
      .tab       { fill: #131a2c; stroke: #2a3352; stroke-width: 1; }
      .tabActive { fill: #1d2742; stroke: #3f66c9; stroke-width: 1; }
      .underline { fill: #3f66c9; }
      .plus      { fill: #1d2742; stroke: #3a486b; stroke-width: 1; }
      .plusDis   { fill: #151b2c; stroke: #2a3352; stroke-width: 1; }
      .label     { fill: #c8d0e4; font-family: system-ui, sans-serif; font-size: 13px; }
      .labelBold { fill: #e7ebf5; font-family: system-ui, sans-serif; font-size: 13px;
                   font-weight: 600; }
      .labelMu   { fill: #8e97ae; font-family: system-ui, sans-serif; font-size: 12px; }
      .x         { fill: #6d7690; font-family: system-ui, sans-serif; font-size: 12px; }
      .watermark { fill: #6d7690; font-family: system-ui, sans-serif; font-size: 11px;
                   letter-spacing: 0.08em; }
      .caption   { fill: #8e97ae; font-family: system-ui, sans-serif; font-size: 12px;
                   font-style: italic; }
    </style>
  </defs>

  <rect class="bg" width="960" height="220" />

  <!-- Tab bar rail -->
  <rect class="panel" x="20" y="40" width="920" height="48" />

  <!-- Tab 1: manually renamed, active -->
  <rect class="tabActive" x="32" y="48" width="200" height="34" rx="4" ry="4" />
  <text class="labelBold" x="48" y="70">Corp recon</text>
  <text class="x" x="162" y="70">↺</text>
  <text class="x" x="200" y="70">×</text>
  <rect class="underline" x="32" y="82" width="200" height="2" />

  <!-- Tab 2: auto-generated, inactive -->
  <rect class="tab" x="248" y="48" width="220" height="34" rx="4" ry="4" />
  <text class="label" x="264" y="70">Last 1h · High</text>
  <text class="x" x="436" y="70">×</text>

  <!-- Tab 3: auto-generated blank, inactive -->
  <rect class="tab" x="484" y="48" width="140" height="34" rx="4" ry="4" />
  <text class="label" x="500" y="70">New tab</text>
  <text class="x" x="592" y="70">×</text>

  <!-- + affordance -->
  <rect class="plus" x="640" y="48" width="36" height="34" rx="4" ry="4" />
  <text class="labelBold" x="652" y="71">+</text>

  <!-- Captions beneath each tab explaining the feature -->
  <text class="caption" x="32" y="116">Manually renamed</text>
  <text class="caption" x="32" y="132">→ ↺ reverts to auto-generated</text>
  <text class="caption" x="248" y="116">Auto-generated from filter</text>
  <text class="caption" x="248" y="132">summary (e.g. Last 1h · High)</text>
  <text class="caption" x="484" y="116">Blank tab — filter is default,</text>
  <text class="caption" x="484" y="132">query does not auto-run</text>
  <text class="caption" x="640" y="116">Open a new tab (up to 8);</text>
  <text class="caption" x="640" y="132">disabled with tooltip at cap</text>

  <text class="watermark" x="20" y="206">WIREFRAME · SWITCHING TABS NEVER HITS THE NETWORK</text>
</svg>
