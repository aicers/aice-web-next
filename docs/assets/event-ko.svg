<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">이벤트 페이지 — Conn 수직 슬라이스 (와이어프레임)</title>
  <desc id="desc">/event 페이지의 와이어프레임. 필터 카드에는 레코드 유형 선택("연결 (Conn)"), 단일 센서 선택, 빠른 범위 드롭다운, 시작/종료 시간 범위, 출발지/목적지 IP·포트 범위 입력과 적용·초기화 버튼이 있습니다. 그 아래 결과 테이블에는 시간, 출발지, 목적지, 프로토콜, 상태, 서비스, 송신 바이트, 수신 바이트 열로 Conn 레코드가 표시되며 행을 클릭하면 상세 패널이 열립니다. 테이블 하단에는 이전/다음 커서 페이지네이션과 페이지당 행 수 선택기가 있습니다. Giganto 연결에는 총 개수가 없으므로 표시되지 않습니다.</desc>
  <style>
    .bg { fill: #fafafa; }
    .panel { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1; }
    .field { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; }
    .h1 { font-size: 18px; fill: #18181b; font-weight: 700; }
    .sub { font-size: 11px; fill: #71717a; }
    .label { font-size: 10px; fill: #52525b; font-weight: 600; }
    .val { font-size: 11px; fill: #18181b; }
    .muted { font-size: 10px; fill: #a1a1aa; }
    .btn { fill: #18181b; }
    .btn-text { fill: #ffffff; font-size: 11px; font-weight: 600; }
    .btn-outline { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; }
    .btn-outline-text { fill: #18181b; font-size: 11px; font-weight: 600; }
    .th { font-size: 10px; fill: #52525b; font-weight: 700; }
    .td { font-size: 10px; fill: #27272a; }
    .row { fill: #ffffff; }
    .rowalt { fill: #f4f4f5; }
  </style>

  <rect class="bg" width="760" height="460"/>
  <text x="24" y="32" class="h1">이벤트</text>
  <text x="24" y="48" class="sub">Giganto가 수집한 원본 이벤트를 조회합니다.</text>

  <!-- Filters card -->
  <rect class="panel" x="24" y="60" width="712" height="150" rx="6" ry="6"/>
  <text x="40" y="82" class="label">필터</text>

  <text x="40" y="104" class="label">레코드 유형</text>
  <rect class="field" x="40" y="110" width="200" height="24" rx="4"/>
  <text x="50" y="126" class="val">연결 (Conn)</text>

  <text x="256" y="104" class="label">센서</text>
  <rect class="field" x="256" y="110" width="200" height="24" rx="4"/>
  <text x="266" y="126" class="val">sensor-a</text>

  <text x="472" y="104" class="label">빠른 범위</text>
  <rect class="field" x="472" y="110" width="248" height="24" rx="4"/>
  <text x="482" y="126" class="val">1시간</text>

  <text x="40" y="152" class="label">시작</text>
  <rect class="field" x="40" y="158" width="200" height="24" rx="4"/>
  <text x="256" y="152" class="label">종료</text>
  <rect class="field" x="256" y="158" width="200" height="24" rx="4"/>

  <text x="472" y="152" class="label">출발지/목적지 IP·포트 범위</text>
  <rect class="field" x="472" y="158" width="120" height="24" rx="4"/>
  <rect class="field" x="600" y="158" width="120" height="24" rx="4"/>

  <!-- results table -->
  <rect class="panel" x="24" y="224" width="712" height="180" rx="6" ry="6"/>
  <line x1="24" y1="252" x2="736" y2="252" stroke="#e5e7eb" stroke-width="1"/>
  <text x="40" y="245" class="th">시간</text>
  <text x="150" y="245" class="th">출발지</text>
  <text x="270" y="245" class="th">목적지</text>
  <text x="388" y="245" class="th">프로토콜</text>
  <text x="452" y="245" class="th">상태</text>
  <text x="520" y="245" class="th">서비스</text>
  <text x="600" y="245" class="th" text-anchor="end">송신 바이트</text>
  <text x="712" y="245" class="th" text-anchor="end">수신 바이트</text>

  <g>
    <rect class="rowalt" x="25" y="253" width="710" height="26"/>
    <text x="40" y="270" class="td">2026-06-09 00:00:00</text>
    <text x="150" y="270" class="td">192.168.0.10:51000</text>
    <text x="270" y="270" class="td">10.0.0.5:443</text>
    <text x="388" y="270" class="td">TCP</text>
    <text x="452" y="270" class="td">ShDdAaFf</text>
    <text x="520" y="270" class="td">ssl</text>
    <text x="600" y="270" class="td" text-anchor="end">2,048</text>
    <text x="712" y="270" class="td" text-anchor="end">9,931</text>
  </g>
  <g>
    <rect class="row" x="25" y="279" width="710" height="26"/>
    <text x="40" y="296" class="td">2026-06-09 00:00:01</text>
    <text x="150" y="296" class="td">192.168.0.11:51001</text>
    <text x="270" y="296" class="td">10.0.0.6:53</text>
    <text x="388" y="296" class="td">UDP</text>
    <text x="452" y="296" class="td">—</text>
    <text x="520" y="296" class="td">dns</text>
    <text x="600" y="296" class="td" text-anchor="end">64</text>
    <text x="712" y="296" class="td" text-anchor="end">128</text>
  </g>
  <g>
    <rect class="rowalt" x="25" y="305" width="710" height="26"/>
    <text x="40" y="322" class="td">2026-06-09 00:00:02</text>
    <text x="150" y="322" class="td">192.168.0.12:51002</text>
    <text x="270" y="322" class="td">10.0.0.7:80</text>
    <text x="388" y="322" class="td">TCP</text>
    <text x="452" y="322" class="td">ShADad</text>
    <text x="520" y="322" class="td">http</text>
    <text x="600" y="322" class="td" text-anchor="end">512</text>
    <text x="712" y="322" class="td" text-anchor="end">4,096</text>
  </g>

  <text x="40" y="380" class="label">페이지당 행</text>
  <rect class="field" x="116" y="366" width="56" height="22" rx="4"/>
  <text x="126" y="381" class="val">50</text>

  <rect class="btn-outline" x="560" y="364" width="74" height="26" rx="4"/>
  <text x="597" y="381" class="btn-outline-text" text-anchor="middle">‹ 이전</text>
  <rect class="btn" x="644" y="364" width="62" height="26" rx="4"/>
  <text x="675" y="381" class="btn-text" text-anchor="middle">다음 ›</text>

  <text x="24" y="424" class="muted">와이어프레임 대체본 — 테이블은 Giganto에서 받은 데이터를 표시하므로 실제 데이터 캡처 전까지 자리표시자로 제공됩니다.</text>
</svg>
