<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 80" font-family="-apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">탐지 탭 바 (와이어프레임)</title>
  <desc id="desc">필터/결과 영역 위의 다중 탭 바 와이어프레임: 활성 탭 "최근 1시간 · 높음", 이름을 수동 지정한 휴면 탭 "출발지: 10.0.0.5"에는 이름 초기화 어포던스가 있고, 또 다른 휴면 탭 "새 탭"과 오른쪽의 새 탭을 여는 더하기 어포던스가 있다. 각 탭에는 × 닫기 버튼이 붙어 있다.</desc>

  <style>
    .bg { fill: #fafafa; }
    .border { stroke: #e5e7eb; stroke-width: 1; }
    .tab-inactive { fill: #f4f4f5; stroke: #e5e7eb; stroke-width: 1; rx: 6; ry: 6; }
    .tab-active { fill: #ffffff; stroke: #18181b; stroke-width: 1.5; rx: 6; ry: 6; }
    .tab-active-underline { stroke: #18181b; stroke-width: 2; }
    .tab-label { font-size: 13px; fill: #18181b; font-weight: 500; }
    .tab-label-inactive { font-size: 13px; fill: #52525b; font-weight: 500; }
    .chip-icon { stroke: #71717a; stroke-width: 1.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .chip-icon-muted { stroke: #a1a1aa; stroke-width: 1.3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .add-btn { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 6; ry: 6; }
    .add-icon { stroke: #18181b; stroke-width: 1.6; fill: none; stroke-linecap: round; }
    .muted { font-size: 11px; fill: #a1a1aa; }
  </style>

  <rect class="bg" x="0" y="0" width="880" height="80" />

  <!-- 활성 탭 -->
  <g transform="translate(16, 16)">
    <rect class="tab-active" x="0" y="0" width="180" height="34" />
    <line class="tab-active-underline" x1="0" y1="34" x2="180" y2="34" />
    <text class="tab-label" x="14" y="22">최근 1시간 · 높음</text>
    <g transform="translate(152, 11)">
      <path class="chip-icon" d="M1 1 L11 11 M11 1 L1 11" />
    </g>
  </g>

  <!-- 수동 이름 지정된 휴면 탭 -->
  <g transform="translate(212, 16)">
    <rect class="tab-inactive" x="0" y="0" width="220" height="34" />
    <text class="tab-label-inactive" x="14" y="22">출발지: 10.0.0.5</text>
    <g transform="translate(166, 11)">
      <path class="chip-icon-muted" d="M0 4 A 4 4 0 1 0 4 0 L 4 -2 L 7 1 L 4 4" />
    </g>
    <g transform="translate(194, 11)">
      <path class="chip-icon-muted" d="M1 1 L11 11 M11 1 L1 11" />
    </g>
  </g>

  <!-- 휴면 탭 '새 탭' -->
  <g transform="translate(448, 16)">
    <rect class="tab-inactive" x="0" y="0" width="110" height="34" />
    <text class="tab-label-inactive" x="14" y="22">새 탭</text>
    <g transform="translate(84, 11)">
      <path class="chip-icon-muted" d="M1 1 L11 11 M11 1 L1 11" />
    </g>
  </g>

  <!-- + 어포던스 -->
  <g transform="translate(578, 16)">
    <rect class="add-btn" x="0" y="0" width="34" height="34" />
    <path class="add-icon" d="M17 10 L17 24 M10 17 L24 17" />
  </g>

  <!-- 구분선 -->
  <line class="border" x1="16" y1="62" x2="864" y2="62" />

  <!-- 설명 -->
  <text class="muted" x="622" y="40">최대 8개</text>
</svg>
