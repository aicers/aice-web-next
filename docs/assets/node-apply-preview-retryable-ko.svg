<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, 'Noto Sans CJK KR', 'Apple SD Gothic Neo', sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">적용 미리보기 모달 — failed_retryable 와 다시 시도 (와이어프레임)</title>
  <desc id="desc">적용이 failed_retryable 로 정착한 직후의 모달 와이어프레임. 매니저 행은 성공(녹색), 데이터 저장소 행은 실패(재시도 가능)(주황) 와 인라인 오류 메시지, 행 우측에 다시 시도 버튼, TI 컨테이너 행은 대기 중(무채색). 푸터에는 닫기와 다시 빌드 버튼이 있고, 행별 다시 시도가 주된 복구 수단.</desc>

  <style>
    .scrim { fill: #18181b; fill-opacity: 0.55; }
    .modal { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 10; ry: 10; }
    .divider { stroke: #e5e7eb; stroke-width: 1; }
    .row-list { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 6; ry: 6; }
    .btn { fill: #ffffff; stroke: #3f3f46; stroke-width: 1; rx: 6; ry: 6; }
    .btn-sm { fill: #ffffff; stroke: #3f3f46; stroke-width: 1; rx: 6; ry: 6; }
    .h1 { font-size: 18px; font-weight: 600; fill: #18181b; }
    .sub { font-size: 12px; fill: #52525b; }
    .heading { font-size: 13px; font-weight: 600; fill: #18181b; }
    .row-label { font-size: 13px; font-weight: 500; fill: #18181b; }
    .state-succeeded { font-size: 11px; fill: #059669; }
    .state-retryable { font-size: 11px; fill: #b45309; }
    .state-queued { font-size: 11px; fill: #71717a; }
    .err { font-size: 11px; fill: #b91c1c; }
    .btn-text { font-size: 13px; fill: #18181b; }
    .btn-sm-text { font-size: 12px; fill: #18181b; }
    .muted { font-size: 11px; fill: #71717a; font-style: italic; }
  </style>

  <rect class="scrim" x="0" y="0" width="880" height="540" />
  <rect class="modal" x="80" y="32" width="720" height="476" />

  <g transform="translate(112, 68)">
    <text class="h1">적용 미리보기</text>
    <text class="sub" y="22">디스패치가 실패했습니다. 행에서 다시 시도하거나 미리보기를 다시 빌드하세요.</text>
  </g>
  <line class="divider" x1="112" y1="116" x2="768" y2="116" />

  <g transform="translate(112, 144)">
    <text class="heading">디스패치</text>
  </g>

  <rect class="row-list" x="112" y="160" width="656" height="208" />

  <g transform="translate(128, 176)">
    <text class="row-label">매니저 (applyNode)</text>
    <text class="state-succeeded" y="18">성공</text>
  </g>
  <line class="divider" x1="112" y1="224" x2="768" y2="224" />

  <g transform="translate(128, 240)">
    <text class="row-label">데이터 저장소 (updateConfig)</text>
    <text class="state-retryable" y="18">실패 (재시도 가능)</text>
    <text class="err" y="36">오류: 연결이 거부되었습니다</text>
  </g>
  <g transform="translate(672, 248)">
    <rect class="btn-sm" x="0" y="0" width="84" height="28" />
    <text class="btn-sm-text" x="42" y="18" text-anchor="middle">다시 시도</text>
  </g>
  <line class="divider" x1="112" y1="304" x2="768" y2="304" />

  <g transform="translate(128, 320)">
    <text class="row-label">TI 컨테이너 (updateConfig)</text>
    <text class="state-queued" y="18">대기 중</text>
  </g>

  <line class="divider" x1="112" y1="408" x2="768" y2="408" />
  <g transform="translate(560, 424)">
    <rect class="btn" x="0" y="0" width="80" height="34" />
    <text class="btn-text" x="40" y="22" text-anchor="middle">닫기</text>
    <rect class="btn" x="92" y="0" width="100" height="34" />
    <text class="btn-text" x="142" y="22" text-anchor="middle">다시 빌드</text>
  </g>

  <text class="muted" x="120" y="494">와이어프레임 대체본 — 매뉴얼의 스크린샷 부족 안내 참조.</text>
</svg>
