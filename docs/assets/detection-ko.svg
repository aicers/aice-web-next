<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" font-family="-apple-system, Apple SD Gothic Neo, Noto Sans KR, Segoe UI, Roboto, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">탐지 페이지 — 와이어프레임</title>
  <desc id="desc">탐지 페이지의 라인 와이어프레임. 왼쪽 추천/저장된 필터 레일, 상단 필터 버튼과 활성 필터 칩 바, 두 줄로 표시되는 결과 행(심각도 배지, 시각, 종류, 신뢰도, 트리아지 요약, 출발지/목적지 엔드포인트, 센서, 조사 열기 버튼), 탐지된 이벤트 <범위> / <전체건수> · 마지막 갱신 · 새로 고침 · CSV 다운로드 헤더, 그리고 아래쪽의 접힌 분석 스트립을 보여 줍니다.</desc>

  <style>
    .page { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1; }
    .panel { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; rx: 8; ry: 8; }
    .panel-dashed { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1; stroke-dasharray: 4 3; rx: 6; ry: 6; }
    .chip { fill: #f4f4f5; stroke: #d4d4d8; stroke-width: 1; rx: 12; ry: 12; }
    .chip-x { fill: #71717a; }
    .btn { fill: #ffffff; stroke: #3f3f46; stroke-width: 1; rx: 4; ry: 4; }
    .btn-disabled { fill: #fafafa; stroke: #a1a1aa; stroke-width: 1; rx: 4; ry: 4; }
    .badge-high { fill: #fef2f2; stroke: #dc2626; stroke-width: 1; rx: 10; ry: 10; }
    .badge-medium { fill: #fffbeb; stroke: #d97706; stroke-width: 1; rx: 10; ry: 10; }
    .badge-low { fill: #f4f4f5; stroke: #71717a; stroke-width: 1; rx: 10; ry: 10; }
    .row { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1; }
    .row-alt { fill: #fafafa; stroke: #e5e7eb; stroke-width: 1; }
    .h1 { font-size: 18px; font-weight: 600; fill: #18181b; }
    .h2 { font-size: 13px; font-weight: 600; fill: #18181b; }
    .lbl { font-size: 12px; fill: #52525b; }
    .val { font-size: 12px; fill: #18181b; }
    .mono { font-size: 11px; fill: #18181b; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .muted { font-size: 11px; fill: #71717a; }
    .pill { font-size: 10px; fill: #18181b; }
    .level-high { font-size: 10px; font-weight: 700; fill: #dc2626; }
    .level-medium { font-size: 10px; font-weight: 700; fill: #d97706; }
    .level-low { font-size: 10px; font-weight: 700; fill: #52525b; }
    .arrow { font-size: 12px; fill: #71717a; }
  </style>

  <rect class="page" x="0" y="0" width="1280" height="820"/>

  <!-- 사이드바 / 좌측 레일 -->
  <rect x="0" y="0" width="200" height="820" fill="#fafafa" stroke="#e5e7eb"/>
  <text x="20" y="36" class="h2">추천 필터</text>
  <rect x="20" y="48" width="160" height="32" class="panel-dashed"/>
  <text x="100" y="68" class="muted" text-anchor="middle">아직 필터가 없습니다.</text>

  <text x="20" y="112" class="h2">저장된 필터</text>
  <rect x="20" y="124" width="160" height="32" class="panel-dashed"/>
  <text x="100" y="144" class="muted" text-anchor="middle">아직 필터가 없습니다.</text>

  <!-- 상단 바 -->
  <rect x="220" y="20" width="100" height="32" class="btn"/>
  <text x="270" y="40" class="val" text-anchor="middle">⚙ 필터</text>

  <!-- 활성 칩 바 -->
  <rect x="332" y="20" width="928" height="32" class="panel-dashed"/>
  <rect x="344" y="26" width="124" height="20" class="chip"/>
  <text x="354" y="40" class="muted">기간:</text>
  <text x="386" y="40" class="pill">최근 1시간</text>
  <text x="456" y="40" class="chip-x" font-size="12">×</text>
  <rect x="476" y="26" width="138" height="20" class="chip"/>
  <text x="486" y="40" class="muted">출발지:</text>
  <text x="528" y="40" class="pill">10.0.0.5</text>
  <text x="602" y="40" class="chip-x" font-size="12">×</text>
  <rect x="622" y="26" width="160" height="20" class="chip"/>
  <text x="632" y="40" class="muted">호스트명:</text>
  <text x="694" y="40" class="pill">7개 선택됨</text>
  <text x="770" y="40" class="chip-x" font-size="12">×</text>
  <rect x="790" y="26" width="116" height="20" class="chip"/>
  <text x="800" y="40" class="muted">심각도:</text>
  <text x="848" y="40" class="pill">HIGH</text>
  <text x="894" y="40" class="chip-x" font-size="12">×</text>

  <!-- 결과 리스트 패널 (히어로) -->
  <rect x="220" y="68" width="1040" height="596" class="panel"/>

  <!-- 리스트 헤더 -->
  <text x="240" y="92" class="h1">탐지된 이벤트 1-50 / 1,284</text>
  <text x="980" y="92" class="muted">마지막 갱신 방금 전</text>
  <rect x="1078" y="76" width="84" height="28" class="btn"/>
  <text x="1120" y="94" class="val" text-anchor="middle">↻ 새로 고침</text>
  <rect x="1166" y="76" width="86" height="28" class="btn-disabled"/>
  <text x="1208" y="94" class="muted" text-anchor="middle">⤓ CSV</text>
  <line x1="220" y1="116" x2="1260" y2="116" stroke="#e5e7eb"/>

  <!-- 행 1 -->
  <rect x="220" y="116" width="1040" height="68" class="row"/>
  <rect x="240" y="128" width="50" height="18" class="badge-high"/>
  <text x="265" y="141" class="level-high" text-anchor="middle">HIGH</text>
  <text x="304" y="141" class="mono">2026-04-22 12:45</text>
  <text x="416" y="141" class="val">HTTP 위협</text>
  <text x="486" y="141" class="muted">공격: sql-injection</text>
  <text x="624" y="141" class="muted">초기 침투</text>
  <text x="1080" y="141" class="mono" text-anchor="end">0.92</text>
  <text x="1170" y="141" class="muted" text-anchor="end">정책 2건 · 최대 0.87</text>
  <text x="1240" y="141" class="muted" text-anchor="end">⧉</text>
  <text x="240" y="170" class="mono">10.0.0.5:54321 (US)</text>
  <text x="394" y="170" class="arrow">→</text>
  <text x="408" y="170" class="mono">203.0.113.45:80 (DE)</text>
  <text x="1240" y="170" class="muted" text-anchor="end">sensor-edge-01</text>

  <!-- 행 2 -->
  <rect x="220" y="184" width="1040" height="68" class="row-alt"/>
  <rect x="240" y="196" width="68" height="18" class="badge-medium"/>
  <text x="274" y="209" class="level-medium" text-anchor="middle">MEDIUM</text>
  <text x="324" y="209" class="mono">2026-04-22 12:43</text>
  <text x="436" y="209" class="val">멀티호스트 포트 스캔</text>
  <text x="608" y="209" class="muted">탐색</text>
  <text x="1080" y="209" class="mono" text-anchor="end">0.74</text>
  <text x="1240" y="209" class="muted" text-anchor="end">⧉</text>
  <text x="240" y="238" class="mono">192.168.1.20 (US)</text>
  <text x="384" y="238" class="arrow">→</text>
  <text x="398" y="238" class="mono">203.0.113.1:22 (DE) +2건</text>
  <text x="1240" y="238" class="muted" text-anchor="end">sensor-net-02</text>

  <!-- 행 3 -->
  <rect x="220" y="252" width="1040" height="68" class="row"/>
  <rect x="240" y="264" width="50" height="18" class="badge-low"/>
  <text x="265" y="277" class="level-low" text-anchor="middle">LOW</text>
  <text x="304" y="277" class="mono">2026-04-22 12:41</text>
  <text x="416" y="277" class="val">DNS 은밀 채널</text>
  <text x="540" y="277" class="muted">명령 및 제어</text>
  <text x="1080" y="277" class="mono" text-anchor="end">0.41</text>
  <text x="1240" y="277" class="muted" text-anchor="end">⧉</text>
  <text x="240" y="306" class="mono">10.0.0.55:53 (US)</text>
  <text x="376" y="306" class="arrow">→</text>
  <text x="390" y="306" class="mono">198.51.100.20:53 (RU)</text>
  <text x="1240" y="306" class="muted" text-anchor="end">sensor-dns-01</text>

  <!-- 행 4 -->
  <rect x="220" y="320" width="1040" height="68" class="row-alt"/>
  <rect x="240" y="332" width="50" height="18" class="badge-high"/>
  <text x="265" y="345" class="level-high" text-anchor="middle">HIGH</text>
  <text x="304" y="345" class="mono">2026-04-22 12:38</text>
  <text x="416" y="345" class="val">Windows 위협</text>
  <text x="510" y="345" class="muted">공격: credential-dumping</text>
  <text x="704" y="345" class="muted">자격 증명 접근</text>
  <text x="1080" y="345" class="mono" text-anchor="end">0.88</text>
  <text x="1170" y="345" class="muted" text-anchor="end">정책 1건 · 최대 0.88</text>
  <text x="1240" y="345" class="muted" text-anchor="end">⧉</text>
  <text x="240" y="374" class="mono">—</text>
  <text x="280" y="374" class="arrow">→</text>
  <text x="296" y="374" class="mono">—</text>
  <text x="1240" y="374" class="muted" text-anchor="end">sensor-host-04</text>

  <!-- 추가 빈 행 -->
  <rect x="220" y="388" width="1040" height="68" class="row"/>
  <rect x="220" y="456" width="1040" height="68" class="row-alt"/>
  <rect x="220" y="524" width="1040" height="68" class="row"/>
  <text x="740" y="640" class="muted" text-anchor="middle">… 패널 안에서 1,278건 더 스크롤됩니다 …</text>

  <!-- 분석 스트립 (접힘) -->
  <rect x="220" y="684" width="1040" height="40" class="panel"/>
  <text x="244" y="708" class="h2">▸ 분석</text>
  <text x="304" y="708" class="muted">기본은 접힘 — 펼치면 집계가 표시됩니다.</text>
</svg>
