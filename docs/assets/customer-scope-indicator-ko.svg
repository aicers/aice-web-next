<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14">
  <rect width="1200" height="220" fill="#0d1117"/>

  <!-- Breadcrumb bar -->
  <rect x="0" y="0" width="1200" height="64" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="32" y="40" fill="#8b949e">탐지</text>
  <text x="80" y="40" fill="#8b949e">›</text>
  <text x="98" y="40" fill="#c9d1d9" font-weight="600">검색</text>

  <!-- Indicator pill (right-aligned) -->
  <g transform="translate(900,28)">
    <rect width="260" height="28" rx="14" fill="#21262d" stroke="#30363d"/>
    <text x="14" y="18" fill="#c9d1d9">⌥ 고객사: ACME, Beta, Gamma</text>
    <text x="240" y="18" fill="#8b949e">▾</text>
  </g>

  <!-- Page-level callout -->
  <g transform="translate(32,96)">
    <rect width="1136" height="36" rx="6" fill="#0d1117" stroke="#30363d"/>
    <text x="14" y="23" fill="#8b949e">ⓘ  3개 고객사 데이터를 표시 중입니다. 자세한 내용은 위의 고객사 표시기를 클릭하세요.</text>
  </g>

  <!-- Popover preview -->
  <g transform="translate(900,148)">
    <rect width="260" height="60" rx="6" fill="#161b22" stroke="#30363d"/>
    <text x="14" y="22" fill="#c9d1d9" font-size="11" font-weight="600">고객사 범위</text>
    <text x="14" y="42" fill="#8b949e" font-size="11">계정에 할당됨</text>
    <text x="14" y="56" fill="#58a6ff" font-size="11">고객사 관리</text>
  </g>

  <text x="32" y="204" fill="#6e7681" font-size="11">와이어프레임 임시 이미지 (이슈 #383). 다중 고객사 픽스처가 포함된 auth_db가 준비되면 실제 PNG로 교체합니다.</text>
</svg>
