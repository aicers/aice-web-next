<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 120" width="720" height="120" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13">
  <title>Status row with the Sensor agent in idle state (wireframe stand-in)</title>
  <desc>One node row from the Status tab. The Sensor service column shows an amber dot with the label "Idle"; tooltip on hover reads "Agent reload failed". Wireframe placeholder until an actual capture is taken.</desc>
  <rect x="0" y="0" width="720" height="120" fill="#fafafa" stroke="#e5e7eb"/>
  <rect x="0" y="0" width="720" height="32" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="16" y="20" fill="#6b7280">Node</text>
  <text x="160" y="20" fill="#6b7280">CPU</text>
  <text x="240" y="20" fill="#6b7280">Memory</text>
  <text x="340" y="20" fill="#6b7280">Disk</text>
  <text x="430" y="20" fill="#6b7280">Manager</text>
  <text x="520" y="20" fill="#6b7280">Sensor</text>
  <text x="610" y="20" fill="#6b7280">Data Store</text>
  <text x="16" y="68" fill="#111827">alpha-node</text>
  <text x="16" y="86" fill="#9ca3af" font-size="11">alpha.lan</text>
  <text x="160" y="68" fill="#111827">12.5%</text>
  <text x="240" y="68" fill="#111827">8.0 / 16.0 GB</text>
  <text x="340" y="68" fill="#111827">256 / 1024 GB</text>
  <rect x="430" y="58" width="64" height="20" rx="9" fill="none" stroke="#10b981"/>
  <text x="448" y="72" fill="#047857">Running</text>
  <circle cx="528" cy="68" r="5" fill="#f59e0b"/>
  <text x="540" y="72" fill="#111827">Idle</text>
  <circle cx="618" cy="68" r="5" fill="#10b981"/>
  <text x="630" y="72" fill="#111827">On</text>
</svg>
