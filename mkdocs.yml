site_name: AICE Web Manual
site_description: AICE Web user manual
repo_url: https://github.com/aicers/aice-web-next
site_url: https://example.invalid/aice-web-next

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.tracking
    - search.highlight
    - search.suggest

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          build: true
          default: true
          nav:
            - Overview: index.md
            - Getting Started: getting-started.md
            - Settings: settings.md
        - locale: ko
          name: 한국어
          build: true
          nav:
            - Overview: index.md
            - Getting Started: getting-started.md
            - Settings: settings.md
          nav_translations:
            Overview: 개요
            Getting Started: 시작하기
            Settings: 설정

extra_css:
  - styles/lists.css
  - styles/pdf.css
