site_name: AICE Web Manual
site_description: AICE Web user manual
repo_url: https://github.com/aicers/aice-web-next
site_url: https://example.invalid/aice-web-next

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.tracking
    - search.highlight
    - search.suggest

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          build: true
          default: true
          nav:
            - Overview: index.md
            - Getting Started: getting-started.md
            - Detection: detection.md
            - Event Investigation: event-investigation.md
            - Operations:
                - Node management: operations/node-management.md
                - mTLS certificate rotation: operations/mtls-rotation.md
            - Settings: settings.md
            - Customer Scope: customer-scope.md
        - locale: ko
          name: 한국어
          build: true
          nav:
            - Overview: index.md
            - Getting Started: getting-started.md
            - Detection: detection.md
            - Event Investigation: event-investigation.md
            - Operations:
                - Node management: operations/node-management.md
                - mTLS certificate rotation: operations/mtls-rotation.md
            - Settings: settings.md
            - Customer Scope: customer-scope.md
          nav_translations:
            Overview: 개요
            Getting Started: 시작하기
            Detection: 탐지
            Event Investigation: 이벤트 조사
            Operations: 운영
            Node management: 노드 관리
            mTLS certificate rotation: mTLS 인증서 교체
            Settings: 설정
            Customer Scope: 고객사 범위

markdown_extensions:
  - attr_list

extra_css:
  - styles/lists.css
  - styles/pdf.css
