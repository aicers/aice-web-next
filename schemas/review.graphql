# — the source of all GraphQL changes — with the `auth-mtls` feature
# enabled, which is how aice-web-next talks to REview. See README.md for
# the exact reproduction steps.

type Agent {
	node: Int!
	key: String!
	kind: AgentKind!
	status: AgentStatus!
	config: String
	draft: String
}

input AgentDraftInput {
	kind: AgentKind!
	key: String!
	status: AgentStatus!
	draft: String
}

input AgentInput {
	kind: AgentKind!
	key: String!
	status: AgentStatus!
	config: String
	draft: String
}

enum AgentKind {
	UNSUPERVISED
	SENSOR
	SEMI_SUPERVISED
	TIME_SERIES_GENERATOR
}

type AgentNotifyAttempt {
	"""
	The bare agent key (matching `Agent.key`).
	"""
	agentKey: String!
	"""
	`true` if the manager accepted the notify request. Does not imply that the agent has
	already applied the new config.
	"""
	succeeded: Boolean!
	"""
	Populated only when `succeeded` is `false`.
	"""
	error: String
}

type AgentSnapshot {
	kind: AgentKind!
	storedStatus: AgentStatus!
	"""
	Serialized TOML string containing the configuration of the agent.
	"""
	config: String
	"""
	Serialized TOML string containing the draft configuration of the agent.
	"""
	draft: String
}

enum AgentStatus {
	DISABLED
	ENABLED
	RELOAD_FAILED
	UNKNOWN
}

