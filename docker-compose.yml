services:
  postgres:
    image: postgres:18-trixie
    profiles: [dev, prod]
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${AICE_POSTGRES_HOST_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
      - ./infra/postgres/init-audit-db.sql:/docker-entrypoint-initdb.d/init-audit-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx-dev:
    image: nginx:alpine
    profiles: [dev]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certs:/etc/nginx/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  next-app:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: [prod]
    expose:
      - "3000"
    env_file:
      - .env
    # Persist <DATA_DIR> across container restarts so first-boot JWT
    # autogen (JWT_SIGNING_KEY_AUTOGEN=1) does not regenerate the key
    # — and therefore invalidate every issued session — on every boot.
    # Production deployments should override this with a Secret mount
    # at JWT_SIGNING_KEY_FILE.
    volumes:
      - next-app-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    # Cheap liveness probe gating the `cron` service (#487 §1). The
    # node:24-bookworm-slim runner does not ship `curl`; the `node -e
    # fetch(...)` form avoids adding a package to the image. The
    # endpoint (`/api/health`) intentionally makes no DB call so a
    # transient upstream blip cannot mask the readiness signal.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  nginx-prod:
    image: nginx:alpine
    profiles: [prod]
    ports:
      - "9443:443"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certs:/etc/nginx/certs:ro
    depends_on:
      - next-app

  # In-repo cron service (#487). Hosts every internal-API hourly
  # trigger for this deployment — currently the Triage baseline
  # dispatcher, with future cleanup / retention endpoints adding their
  # own crontab entries. Single service shared across triggers so the
  # readiness gate / env-passthrough plumbing lives in exactly one
  # place.
  cron:
    build:
      context: ./infra/cron
      dockerfile: Dockerfile
    profiles: [prod]
    env_file:
      - .env
    depends_on:
      next-app:
        condition: service_healthy
    # Persist /var/log/cron across restarts so the timestamped
    # response bodies survive a `docker compose down`. Operators
    # inspecting a partial-success incident the next morning need the
    # full body; the docker logs surface only the one-line summary.
    volumes:
      - cron-logs:/var/log/cron

volumes:
  pgdata:
  next-app-data:
  cron-logs:
