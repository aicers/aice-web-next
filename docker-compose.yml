services:
  postgres:
    image: postgres:18-trixie
    profiles: [dev, prod]
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
      - ./infra/postgres/init-audit-db.sql:/docker-entrypoint-initdb.d/init-audit-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx-dev:
    image: nginx:alpine
    profiles: [dev]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certs:/etc/nginx/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  next-app:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: [prod]
    expose:
      - "3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  nginx-prod:
    image: nginx:alpine
    profiles: [prod]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certs:/etc/nginx/certs:ro
    depends_on:
      - next-app

volumes:
  pgdata:
