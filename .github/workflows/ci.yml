name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: biomejs/setup-biome@v2
        with:
          version: latest
      - run: pnpm check
      - run: pnpm typecheck
      - uses: DavidAnson/markdownlint-cli2-action@v22
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile

  nginx-config:
    name: Nginx Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate dummy TLS certs
        run: |
          mkdir -p infra/certs
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout infra/certs/dev.key -out infra/certs/dev.crt \
            -days 1 -subj '/CN=localhost'
          cp infra/certs/dev.key infra/certs/prod.key
          cp infra/certs/dev.crt infra/certs/prod.crt
      - name: Validate dev config
        run: |
          docker run --rm \
            -v "$PWD/infra/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro" \
            -v "$PWD/infra/certs:/etc/nginx/certs:ro" \
            nginx:alpine nginx -t
      - name: Validate prod config
        run: |
          docker run --rm \
            -v "$PWD/infra/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro" \
            -v "$PWD/infra/certs:/etc/nginx/certs:ro" \
            nginx:alpine nginx -t

  test:
    name: Test
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  e2e:
    name: E2E
    needs: check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-bookworm
        env:
          POSTGRES_DB: auth_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Create audit_db and audit_writer role
        run: psql "postgres://postgres:postgres@localhost:5432/auth_db" -f infra/postgres/init-audit-db.sql
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium --with-deps
      - name: Generate JWT signing key
        run: node e2e/generate-key.mjs
        env:
          DATA_DIR: ./data-e2e
      - name: Run E2E tests
        run: pnpm e2e
        env:
          CI: true
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/auth_db
          AUDIT_DATABASE_URL: postgres://audit_writer:changeme@localhost:5432/audit_db
          DATA_DIR: ./data-e2e
          CSRF_SECRET: ci-e2e-csrf-secret-at-least-32-characters!!
          INIT_ADMIN_USERNAME: admin
          INIT_ADMIN_PASSWORD: Admin1234!
          DEFAULT_LOCALE: en
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  image-build:
    name: Image Build
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check for Dockerfile
        id: dockerfile
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/setup-buildx-action@v3
        if: steps.dockerfile.outputs.exists == 'true'
      - uses: docker/build-push-action@v7
        if: steps.dockerfile.outputs.exists == 'true'
        with:
          context: .
          push: false
