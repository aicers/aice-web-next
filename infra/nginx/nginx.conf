# Example Nginx reverse proxy configuration for AICE Web (Next.js).
#
# This assumes:
# - Next.js production server runs inside Docker as the `next-app` service.
# - TLS certificates are already provisioned (replace the paths below).
# - HTTP traffic is redirected to HTTPS.

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream aice_web_next {
  server next-app:3000;
  keepalive 64;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name localhost;

  http2 on;

  ssl_certificate     /etc/nginx/ssl/localhost.crt;
  ssl_certificate_key /etc/nginx/ssl/localhost.key;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;

  # Optional: enable HSTS once TLS is confirmed working
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;

  location / {
    proxy_pass http://aice_web_next;
    proxy_read_timeout 60s;
    proxy_connect_timeout 60s;
  }

  location /_next/static/ {
    proxy_cache_valid 200 10m;
    proxy_pass http://aice_web_next;
  }

  access_log /var/log/nginx/aice_web_access.log;
  error_log  /var/log/nginx/aice_web_error.log warn;
}
