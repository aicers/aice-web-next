# Validates against schemas/giganto.graphql.
#
# HttpRawEvent network raw-event query. Relay cursor pagination over
# Giganto's HttpConnection (pageInfo + edges, no
# totalCount), mirroring conn-raw-events.graphql. Field names/types are
# verified against the 0.27.0 SDL by the schema-validation gate.
query HttpRawEvents(
  $filter: NetworkFilter!
  $first: Int
  $after: String
  $last: Int
  $before: String
) {
  httpRawEvents(
    filter: $filter
    first: $first
    after: $after
    last: $last
    before: $before
  ) {
    pageInfo {
      hasPreviousPage
      hasNextPage
      startCursor
      endCursor
    }
    edges {
      node {
        time
        origAddr
        origPort
        respAddr
        respPort
        proto
        startTime
        duration
        origPkts
        respPkts
        origL2Bytes
        respL2Bytes
        method
        host
        uri
        referer
        version
        userAgent
        requestLen
        responseLen
        statusCode
        statusMsg
        username
        password
        cookie
        contentEncoding
        contentType
        cacheControl
        filenames
        mimeTypes
        body
        state
      }
      cursor
    }
  }
}
