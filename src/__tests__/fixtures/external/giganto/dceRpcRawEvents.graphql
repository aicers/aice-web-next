# Validates against schemas/giganto.graphql.
#
# DceRpcRawEvent network raw-event query. Relay cursor pagination over
# Giganto's DceRpcConnection (pageInfo + edges, no
# totalCount), mirroring conn-raw-events.graphql. Field names/types are
# verified against the 0.27.0 SDL by the schema-validation gate.
query DceRpcRawEvents(
  $filter: NetworkFilter!
  $first: Int
  $after: String
  $last: Int
  $before: String
) {
  dceRpcRawEvents(
    filter: $filter
    first: $first
    after: $after
    last: $last
    before: $before
  ) {
    pageInfo {
      hasPreviousPage
      hasNextPage
      startCursor
      endCursor
    }
    edges {
      node {
        time
        origAddr
        origPort
        respAddr
        respPort
        proto
        startTime
        duration
        origPkts
        respPkts
        origL2Bytes
        respL2Bytes
        context {
          id
          abstractSyntax
          abstractMajor
          abstractMinor
          transferSyntax
          transferMajor
          transferMinor
          acceptance
          reason
        }
        request
      }
      cursor
    }
  }
}
