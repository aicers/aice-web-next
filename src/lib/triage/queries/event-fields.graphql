# Single source for the per-subtype Event selection used by both the
# Triage `eventList` query (`event-list.graphql`) and the per-id event
# fetch added by #561 (`event-by-id.graphql`). The two operations
# compose this fragment via `# requires:` headers so a field added
# here flows to both call sites without a hand-edit.
#
# The selection includes the minimum the baseline scoring rule and the
# asset list need (interface fields plus `origAddr` and HttpThreat
# `clusterId`) and the pivot-dimension fields enumerated in #476 §1 so
# #452 / #453 can do client-side pivot without re-fetching:
#   - Network fields (`respAddr`, `origPort`, `respPort`,
#     `origCountry`, `respCountry`, `origNetwork`, `respNetwork`) on
#     every subtype that exposes them.
#   - HTTP-shaped fields (`host`, `uri`, `userAgent`) on the four
#     HTTP-shaped subtypes.
#   - DNS-shaped fields (`query`, `answer`) on the four DNS-shaped
#     subtypes (BlocklistMalformedDns is omitted — it carries only
#     question/answer counts, no payload).
#   - TLS-shaped fields (`ja3`, `ja3S`, `serverName`, `serial`,
#     `subjectCommonName`) on the two TLS-shaped subtypes.
#   - Per-protocol identifier fields (#503).
#   - `learningMethod` is picked on every subtype that carries it, so
#     #561's per-id member fetch can evaluate the Tier 2
#     `learningMethods` predicate in-app against the cohort without
#     walking REview's universe-wide `eventList(filter)` stream.
#
# `origNetwork` / `respNetwork` select the membership shape
# (`HostNetworkGroup`) needed by the customer-network classifier so
# the client side can answer "is this address inside the customer's
# defined network?" without an extra round-trip.
fragment TriageEventFields on Event {
  __typename
  id
  time
  sensor
  category
  level
