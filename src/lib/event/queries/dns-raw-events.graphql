# Validates against schemas/giganto.graphql.
#
# DnsRawEvent network raw-event query. Relay cursor pagination over
# Giganto's DnsConnection (pageInfo + edges, no
# totalCount), mirroring conn-raw-events.graphql. Field names/types are
# verified against the 0.27.0 SDL by the schema-validation gate.
query DnsRawEvents(
  $filter: NetworkFilter!
  $first: Int
  $after: String
  $last: Int
  $before: String
) {
  dnsRawEvents(
    filter: $filter
    first: $first
    after: $after
    last: $last
    before: $before
  ) {
    pageInfo {
      hasPreviousPage
      hasNextPage
      startCursor
      endCursor
    }
    edges {
      node {
        time
        origAddr
        origPort
        respAddr
        respPort
        proto
        startTime
        duration
        origPkts
        respPkts
        origL2Bytes
        respL2Bytes
        query
        answer
        transId
        rtt
        qclass
        qtype
        rcode
        aaFlag
        tcFlag
        rdFlag
        raFlag
        ttl
      }
      cursor
    }
  }
}
