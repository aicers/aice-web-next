# Validates against schemas/giganto.graphql.
#
# requires: conn-fields.graphql
#
# Relay cursor pagination over Giganto's ConnRawEventConnection.
# Forward paging uses `first` / `after`; backward paging uses
# `last` / `before`. The connection exposes only `pageInfo` / `edges`
# (no `totalCount`), so the Event menu drives Prev/Next purely off
# `pageInfo`.
query ConnRawEvents(
  $filter: NetworkFilter!
  $first: Int
  $after: String
  $last: Int
  $before: String
) {
  connRawEvents(
    filter: $filter
    first: $first
    after: $after
    last: $last
    before: $before
  ) {
    pageInfo {
      hasPreviousPage
      hasNextPage
      startCursor
      endCursor
    }
    edges {
      node {
        ...ConnFields
      }
      cursor
    }
  }
}
