# Validates against schemas/giganto.graphql.
#
# FileCreateStreamHashEvent (File create stream hash) — Relay cursor pagination over Giganto's
# FileCreateStreamHashEventConnection. One of the 14 Sysmon / Windows endpoint
# operations (E2); the node selection is the full FileCreateStreamHashEvent field set,
# kept in lockstep with SYSMON_RECORD_DEFS in records.ts.
query FileCreateStreamHashEvents(
  $filter: NetworkFilter!
  $first: Int
  $after: String
  $last: Int
  $before: String
) {
  fileCreateStreamHashEvents(
    filter: $filter
    first: $first
    after: $after
    last: $last
    before: $before
  ) {
    pageInfo {
      hasPreviousPage
      hasNextPage
      startCursor
      endCursor
    }
    edges {
      node {
        time
        agentName
        agentId
        processGuid
        processId
        image
        targetFilename
        creationUtcTime
        hash
        contents
        user
      }
      cursor
    }
  }
}
