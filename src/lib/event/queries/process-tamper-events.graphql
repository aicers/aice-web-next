# Validates against schemas/giganto.graphql.
#
# ProcessTamperingEvent (Process tampering) — Relay cursor pagination over Giganto's
# ProcessTamperingEventConnection. One of the 14 Sysmon / Windows endpoint
# operations (E2); the node selection is the full ProcessTamperingEvent field set,
# kept in lockstep with SYSMON_RECORD_DEFS in records.ts.
query ProcessTamperEvents(
  $filter: NetworkFilter!
  $first: Int
  $after: String
  $last: Int
  $before: String
) {
  processTamperEvents(
    filter: $filter
    first: $first
    after: $after
    last: $last
    before: $before
  ) {
    pageInfo {
      hasPreviousPage
      hasNextPage
      startCursor
      endCursor
    }
    edges {
      node {
        time
        agentName
        agentId
        processGuid
        processId
        image
        tamperType
        user
      }
      cursor
    }
  }
}
