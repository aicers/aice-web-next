# Validates against schemas/giganto.graphql.
#
# RegistryValueSetEvent (Registry value set) — Relay cursor pagination over Giganto's
# RegistryValueSetEventConnection. One of the 14 Sysmon / Windows endpoint
# operations (E2); the node selection is the full RegistryValueSetEvent field set,
# kept in lockstep with SYSMON_RECORD_DEFS in records.ts.
query RegistryValueSetEvents(
  $filter: NetworkFilter!
  $first: Int
  $after: String
  $last: Int
  $before: String
) {
  registryValueSetEvents(
    filter: $filter
    first: $first
    after: $after
    last: $last
    before: $before
  ) {
    pageInfo {
      hasPreviousPage
      hasNextPage
      startCursor
      endCursor
    }
    edges {
      node {
        time
        agentName
        agentId
        eventType
        processGuid
        processId
        image
        targetObject
        details
        user
      }
      cursor
    }
  }
}
