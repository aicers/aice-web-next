# Validates against schemas/giganto.graphql.
#
# FileDeleteEvent Sysmon / endpoint event query. Relay cursor pagination over
# Giganto's FileDeleteEventConnection (pageInfo + edges, no totalCount),
# mirroring conn-raw-events.graphql. Sysmon types filter by `agentId`
# (carried on NetworkFilter); field names/types are verified against the
# 0.27.0 SDL by the schema-validation gate.
query FileDeleteEvents(
  $filter: NetworkFilter!
  $first: Int
  $after: String
  $last: Int
  $before: String
) {
  fileDeleteEvents(
    filter: $filter
    first: $first
    after: $after
    last: $last
    before: $before
  ) {
    pageInfo {
      hasPreviousPage
      hasNextPage
      startCursor
      endCursor
    }
    edges {
      node {
        time
        agentName
        agentId
        processGuid
        processId
        user
        image
        targetFilename
        hashes
        isExecutable
        archived
      }
      cursor
    }
  }
}
