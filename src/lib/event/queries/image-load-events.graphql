# Validates against schemas/giganto.graphql.
#
# ImageLoadedEvent (Image load) — Relay cursor pagination over Giganto's
# ImageLoadedEventConnection. One of the 14 Sysmon / Windows endpoint
# operations (E2); the node selection is the full ImageLoadedEvent field set,
# kept in lockstep with SYSMON_RECORD_DEFS in records.ts.
query ImageLoadEvents(
  $filter: NetworkFilter!
  $first: Int
  $after: String
  $last: Int
  $before: String
) {
  imageLoadEvents(
    filter: $filter
    first: $first
    after: $after
    last: $last
    before: $before
  ) {
    pageInfo {
      hasPreviousPage
      hasNextPage
      startCursor
      endCursor
    }
    edges {
      node {
        time
        agentName
        agentId
        processGuid
        processId
        image
        imageLoaded
        fileVersion
        description
        product
        company
        originalFileName
        hashes
        signed
        signature
        signatureStatus
        user
      }
      cursor
    }
  }
}
