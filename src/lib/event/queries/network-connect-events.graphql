# Validates against schemas/giganto.graphql.
#
# NetworkConnectionEvent (Network connection) — Relay cursor pagination over Giganto's
# NetworkConnectionEventConnection. One of the 14 Sysmon / Windows endpoint
# operations (E2); the node selection is the full NetworkConnectionEvent field set,
# kept in lockstep with SYSMON_RECORD_DEFS in records.ts.
query NetworkConnectEvents(
  $filter: NetworkFilter!
  $first: Int
  $after: String
  $last: Int
  $before: String
) {
  networkConnectEvents(
    filter: $filter
    first: $first
    after: $after
    last: $last
    before: $before
  ) {
    pageInfo {
      hasPreviousPage
      hasNextPage
      startCursor
      endCursor
    }
    edges {
      node {
        time
        agentName
        agentId
        processGuid
        processId
        image
        user
        protocol
        initiated
        sourceIsIpv6
        sourceIp
        sourceHostname
        sourcePort
        sourcePortName
        destinationIsIpv6
        destinationIp
        destinationHostname
        destinationPort
        destinationPortName
      }
      cursor
    }
  }
}
