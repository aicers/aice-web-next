# Validates against schemas/giganto.graphql.
#
# DnsEventEvent (DNS query) — Relay cursor pagination over Giganto's
# DnsEventEventConnection. One of the 14 Sysmon / Windows endpoint
# operations (E2); the node selection is the full DnsEventEvent field set,
# kept in lockstep with SYSMON_RECORD_DEFS in records.ts.
query DnsQueryEvents(
  $filter: NetworkFilter!
  $first: Int
  $after: String
  $last: Int
  $before: String
) {
  dnsQueryEvents(
    filter: $filter
    first: $first
    after: $after
    last: $last
    before: $before
  ) {
    pageInfo {
      hasPreviousPage
      hasNextPage
      startCursor
      endCursor
    }
    edges {
      node {
        time
        agentName
        agentId
        processGuid
        processId
        queryName
        queryStatus
        queryResults
        image
        user
      }
      cursor
    }
  }
}
