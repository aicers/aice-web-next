# Validates against schemas/giganto.graphql.
#
# FileDeleteDetectedEvent (File delete detected) — Relay cursor pagination over Giganto's
# FileDeleteDetectedEventConnection. One of the 14 Sysmon / Windows endpoint
# operations (E2); the node selection is the full FileDeleteDetectedEvent field set,
# kept in lockstep with SYSMON_RECORD_DEFS in records.ts.
query FileDeleteDetectedEvents(
  $filter: NetworkFilter!
  $first: Int
  $after: String
  $last: Int
  $before: String
) {
  fileDeleteDetectedEvents(
    filter: $filter
    first: $first
    after: $after
    last: $last
    before: $before
  ) {
    pageInfo {
      hasPreviousPage
      hasNextPage
      startCursor
      endCursor
    }
    edges {
      node {
        time
        agentName
        agentId
        processGuid
        processId
        user
        image
        targetFilename
        hashes
        isExecutable
      }
      cursor
    }
  }
}
