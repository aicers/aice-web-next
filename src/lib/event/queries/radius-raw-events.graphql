# Validates against schemas/giganto.graphql.
#
# RadiusRawEvent network raw-event query. Relay cursor pagination over
# Giganto's RadiusConnection (pageInfo + edges, no
# totalCount), mirroring conn-raw-events.graphql. Field names/types are
# verified against the 0.27.0 SDL by the schema-validation gate.
query RadiusRawEvents(
  $filter: NetworkFilter!
  $first: Int
  $after: String
  $last: Int
  $before: String
) {
  radiusRawEvents(
    filter: $filter
    first: $first
    after: $after
    last: $last
    before: $before
  ) {
    pageInfo {
      hasPreviousPage
      hasNextPage
      startCursor
      endCursor
    }
    edges {
      node {
        time
        origAddr
        origPort
        respAddr
        respPort
        proto
        startTime
        duration
        origPkts
        respPkts
        origL2Bytes
        respL2Bytes
        id
        code
        respCode
        auth
        respAuth
        userName
        userPasswd
        chapPasswd
        nasIp
        nasPort
        state
        nasId
        nasPortType
        message
      }
      cursor
    }
  }
}
