# Validates against schemas/giganto.graphql.
#
# SmbRawEvent network raw-event query. Relay cursor pagination over
# Giganto's SmbConnection (pageInfo + edges, no
# totalCount), mirroring conn-raw-events.graphql. Field names/types are
# verified against the 0.27.0 SDL by the schema-validation gate.
query SmbRawEvents(
  $filter: NetworkFilter!
  $first: Int
  $after: String
  $last: Int
  $before: String
) {
  smbRawEvents(
    filter: $filter
    first: $first
    after: $after
    last: $last
    before: $before
  ) {
    pageInfo {
      hasPreviousPage
      hasNextPage
      startCursor
      endCursor
    }
    edges {
      node {
        time
        origAddr
        origPort
        respAddr
        respPort
        proto
        startTime
        duration
        origPkts
        respPkts
        origL2Bytes
        respL2Bytes
        command
        path
        service
        fileName
        fileSize
        resourceType
        fid
        createTime
        accessTime
        writeTime
        changeTime
      }
      cursor
    }
  }
}
